<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <title>MultiRadios.es</title>
  <meta name="description" content="Escucha en vivo las mejores radios online. Reproductor premium con emisoras de España, Paraguay, Argentina y más.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="MultiRadios.es">
  <meta property="og:title" content="MultiRadios.es | Escucha radios en vivo">
  <meta property="og:description" content="Te invito a escuchar las mejores radios online en directo. ¡Reproductor premium gratis!">
  <meta property="og:image" content="icon-512.png">
  <meta name="theme-color" content="#0B0E14" id="metaThemeColor">
  <link rel="icon" type="image/png" href="favicon.png" id="faviconLink">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MultiRadios">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link id="fontLink" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
  <style>
    :root{
      --accent:#22D3EE; --accent-strong:#06B6D4; --accent-soft:rgba(34,211,238,.14);
      --bg:#0B0E14; --sidebar:#090C12; --surface:#131722; --surface-2:#1A1F2E; --elev:#242A3A;
      --text:#F1F5F9; --muted:#8B93A7; --border:rgba(255,255,255,.06); --player-bg:#0C0F16;
      --font:'Poppins',sans-serif; --font-body:'Manrope',sans-serif; --radius:16px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;}
    body{background:var(--bg);color:var(--text);font-family:var(--font-body);overflow:hidden;-webkit-font-smoothing:antialiased;}
    ::-webkit-scrollbar{width:10px;height:10px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:#252b3a;border-radius:20px;border:2px solid var(--bg);}
    ::-webkit-scrollbar-thumb:hover{background:#333a4d;}
    ::selection{background:var(--accent);color:#04121a;}
    a{color:inherit;text-decoration:none;}
    h1,h2,h3,h4{font-family:var(--font);}
    img{-webkit-user-drag:none;user-select:none;}

    .app{display:grid;grid-template-columns:250px 1fr;height:100vh;height:100dvh;gap:8px;padding:8px 8px calc(94px + 8px);}

    /* SIDEBAR */
    .sidebar{background:var(--sidebar);border-radius:20px;display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--border);transition:transform .3s cubic-bezier(.4,0,.2,1);}
    .brand{display:flex;align-items:center;gap:12px;padding:22px 20px 14px;}
    .brand .mark{width:42px;height:42px;border-radius:13px;flex-shrink:0;background:linear-gradient(145deg,var(--accent),var(--accent-strong));display:grid;place-items:center;color:#04121a;font-size:1.2rem;box-shadow:0 6px 18px rgba(34,211,238,.4);}
    .brand .logo{font-family:var(--font);font-weight:800;font-size:1.2rem;letter-spacing:-.5px;line-height:1;text-transform:uppercase;}
    .brand .logo span{color:var(--accent);}
    .brand .logo-img{height:34px;max-width:150px;object-fit:contain;display:none;}
    .side-close{display:none;margin-left:auto;background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;}

    .side-scroll{flex:1;overflow-y:auto;padding:6px 12px 12px;}
    .side-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);font-weight:700;padding:16px 14px 8px;opacity:.65;}
    .nav-item{display:flex;align-items:center;gap:15px;padding:11px 14px;border-radius:12px;cursor:pointer;color:var(--muted);font-weight:600;font-size:.92rem;transition:background .18s,color .18s;border:none;background:none;text-align:left;width:100%;font-family:var(--font-body);}
    .nav-item i{font-size:1.1rem;width:22px;text-align:center;}
    .nav-item:hover{color:var(--text);background:rgba(255,255,255,.04);}
    .nav-item.active{color:#04121a;background:linear-gradient(135deg,var(--accent),var(--accent-strong));box-shadow:0 6px 16px rgba(34,211,238,.3);}
    .nav-item.active i{color:#04121a;}
    .country-btn{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-radius:10px;cursor:pointer;background:none;border:none;color:var(--muted);font-family:var(--font-body);font-weight:600;font-size:.86rem;width:100%;text-align:left;transition:background .15s,color .15s;}
    .country-btn:hover{color:var(--text);background:rgba(255,255,255,.04);}
    .country-btn.active{color:var(--accent);background:var(--accent-soft);}
    .country-btn .cnt{font-size:.72rem;background:rgba(255,255,255,.07);padding:1px 8px;border-radius:20px;font-weight:700;}

    .side-foot{padding:12px;border-top:1px solid var(--border);}
    .side-btn{width:100%;display:flex;align-items:center;gap:12px;justify-content:center;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent-strong));color:#04121a;cursor:pointer;font-family:var(--font-body);font-weight:700;font-size:.88rem;transition:transform .1s,box-shadow .2s;box-shadow:0 6px 16px rgba(34,211,238,.32);}
    .side-btn:active{transform:scale(.98);}
    .side-btn.install{display:none;}
    .side-btn.install.show{display:flex;}

    /* MAIN */
    .main{background:var(--surface);border-radius:20px;overflow:hidden;min-height:0;min-width:0;display:flex;flex-direction:column;position:relative;border:1px solid var(--border);}
    .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;padding:16px 26px;background:rgba(19,23,34,.7);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);}
    .hamburger{display:none;width:42px;height:42px;border-radius:12px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);cursor:pointer;font-size:1.1rem;}
    .mobile-brand{display:none;align-items:center;gap:9px;}
    .mobile-brand .logo{font-family:var(--font);font-weight:800;font-size:1.05rem;text-transform:uppercase;}
    .mobile-brand .logo span{color:var(--accent);}
    .mobile-brand .logo-img{height:26px;max-width:120px;object-fit:contain;display:none;}
    .search-box{flex:1;max-width:440px;position:relative;}
    .search-box input{width:100%;background:var(--surface-2);border:1px solid var(--border);padding:13px 44px 13px 46px;border-radius:30px;color:var(--text);font-family:var(--font-body);font-size:.95rem;transition:border-color .2s,background .2s;}
    .search-box input::placeholder{color:var(--muted);}
    .search-box input:focus{outline:none;border-color:var(--accent);background:#1e2434;}
    .search-box .s-ico{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--muted);}
    .search-box .mic{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--accent);}
    .topbar-spacer{flex:1;}
    .icon-btn{width:42px;height:42px;border-radius:50%;border:1px solid var(--border);background:var(--surface-2);color:var(--text);cursor:pointer;display:grid;place-items:center;font-size:1rem;transition:background .18s,transform .1s;}
    .icon-btn:hover{background:var(--elev);}
    .icon-btn:active{transform:scale(.94);}

    .content{flex:1;overflow-y:auto;overflow-x:hidden;min-width:0;padding:6px 26px 30px;}

    /* HERO destacada */
    .hero{position:relative;border-radius:22px;overflow:hidden;margin:8px 0 26px;min-height:270px;display:flex;align-items:center;background:var(--surface-2);border:1px solid var(--border);}
    .hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.35;filter:blur(2px);transform:scale(1.08);}
    .hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,var(--surface-2) 8%,rgba(26,31,46,.72) 46%,rgba(26,31,46,.15) 100%);}
    .hero-inner{position:relative;z-index:2;padding:32px 34px;max-width:62%;}
    .hero .tag{font-size:.7rem;text-transform:uppercase;letter-spacing:.18em;color:var(--accent);font-weight:800;margin-bottom:10px;}
    .hero h1{font-size:2.6rem;font-weight:800;letter-spacing:-1px;line-height:1;margin-bottom:12px;}
    .hero p{color:var(--muted);font-size:.95rem;line-height:1.5;max-width:520px;margin-bottom:20px;}
    .hero-btns{display:flex;align-items:center;gap:12px;}
    .btn-listen{display:inline-flex;align-items:center;gap:9px;background:linear-gradient(135deg,var(--accent),var(--accent-strong));color:#04121a;border:none;padding:13px 28px;border-radius:30px;font-family:var(--font-body);font-weight:800;font-size:.95rem;cursor:pointer;box-shadow:0 8px 22px rgba(34,211,238,.4);transition:transform .12s;}
    .btn-listen:hover{transform:translateY(-2px);}
    .btn-listen:active{transform:scale(.97);}
    .btn-bookmark{width:48px;height:48px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text);cursor:pointer;font-size:1.05rem;transition:all .18s;}
    .btn-bookmark.on{color:var(--accent);border-color:var(--accent);}
    .btn-bookmark:hover{background:rgba(255,255,255,.1);}
    .hero-art{position:absolute;right:5%;top:50%;transform:translateY(-50%);width:190px;height:190px;border-radius:20px;object-fit:cover;box-shadow:0 20px 50px rgba(0,0,0,.5);z-index:2;border:2px solid rgba(255,255,255,.08);}

    .section-head{display:flex;align-items:flex-end;justify-content:space-between;margin:24px 0 16px;}
    .section-head h2{font-size:1.4rem;font-weight:800;letter-spacing:-.5px;}
    .section-head .sub{color:var(--muted);font-size:.84rem;margin-top:3px;}

    .chips{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:20px;}
    .chip{padding:8px 16px;border-radius:30px;background:var(--surface-2);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-weight:600;font-size:.83rem;transition:all .18s;font-family:var(--font-body);}
    .chip:hover{color:var(--text);}
    .chip.active{background:var(--accent);color:#04121a;border-color:var(--accent);}

    /* GRID */
    .radio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px;}
    .radio-card{background:var(--surface-2);border-radius:var(--radius);padding:14px;cursor:pointer;transition:background .2s,transform .15s;position:relative;border:1px solid transparent;min-width:0;}
    .radio-card:hover{background:var(--elev);transform:translateY(-3px);}
    .radio-card.active{border-color:var(--accent);background:var(--accent-soft);}
    .card-art{width:100%;aspect-ratio:1/1;border-radius:12px;overflow:hidden;background:linear-gradient(160deg,#1e2434,#12151f);position:relative;margin-bottom:12px;box-shadow:0 8px 20px rgba(0,0,0,.35);}
    .card-art img{width:100%;height:100%;object-fit:cover;}
    .card-country{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);color:#fff;font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.04em;}
    .card-fav{position:absolute;top:6px;right:6px;width:32px;height:32px;border-radius:50%;border:none;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);color:#fff;display:grid;place-items:center;cursor:pointer;opacity:0;transform:scale(.8);transition:opacity .18s,transform .18s,color .18s;font-size:.8rem;z-index:2;}
    .radio-card:hover .card-fav{opacity:1;transform:scale(1);}
    .card-fav.on{opacity:1;transform:scale(1);color:var(--accent);}
    .card-play{position:absolute;bottom:8px;right:8px;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-strong));color:#04121a;display:grid;place-items:center;font-size:1rem;box-shadow:0 8px 18px rgba(34,211,238,.45);opacity:0;transform:translateY(8px);transition:opacity .22s,transform .22s;z-index:2;border:none;cursor:pointer;}
    .radio-card:hover .card-play{opacity:1;transform:translateY(0);}
    .radio-card.active .card-play{opacity:1;transform:translateY(0);}
    .card-title{font-size:.92rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--font);}
    .card-meta{font-size:.76rem;color:var(--muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .eq{position:absolute;bottom:8px;left:8px;display:none;gap:2px;align-items:flex-end;height:16px;z-index:2;}
    .radio-card.playing .eq{display:flex;}
    .eq span{width:3px;background:var(--accent);border-radius:2px;animation:eqa .9s ease-in-out infinite;}
    .eq span:nth-child(1){animation-delay:0s;height:6px;}
    .eq span:nth-child(2){animation-delay:.2s;height:14px;}
    .eq span:nth-child(3){animation-delay:.4s;height:9px;}
    .eq span:nth-child(4){animation-delay:.1s;height:12px;}
    @keyframes eqa{0%,100%{transform:scaleY(.4);}50%{transform:scaleY(1);}}
    .empty-state{text-align:center;padding:70px 20px;color:var(--muted);grid-column:1/-1;}
    .empty-state i{font-size:2.6rem;margin-bottom:14px;color:var(--elev);display:block;}

    /* PLAYER BAR */
    .player-bar{position:fixed;bottom:8px;left:8px;right:8px;height:84px;background:var(--player-bg);border:1px solid var(--border);border-radius:20px;z-index:500;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 22px;box-shadow:0 -4px 30px rgba(0,0,0,.4);gap:16px;}
    .track-info{display:flex;align-items:center;gap:14px;min-width:0;cursor:pointer;}
    .track-info .art{width:56px;height:56px;border-radius:12px;object-fit:cover;flex-shrink:0;background:linear-gradient(160deg,#1e2434,#12151f);box-shadow:0 4px 12px rgba(0,0,0,.4);}
    .track-info .txt{min-width:0;}
    .track-info b{display:block;font-size:.94rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--font);}
    .track-info span{font-size:.77rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
    .track-info .fav-mini{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.05rem;padding:6px;flex-shrink:0;transition:color .18s,transform .1s;}
    .track-info .fav-mini.on{color:var(--accent);}
    .controls{display:flex;align-items:center;gap:18px;}
    .btn-nav{background:none;border:none;color:var(--muted);font-size:1.15rem;cursor:pointer;transition:color .18s,transform .1s;}
    .btn-nav:hover{color:var(--text);}
    .btn-nav:active{transform:scale(.9);}
    .p-play{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-strong));color:#04121a;display:grid;place-items:center;font-size:1.3rem;cursor:pointer;border:none;transition:transform .12s,box-shadow .18s;box-shadow:0 6px 20px rgba(34,211,238,.45);}
    .p-play:hover{transform:scale(1.06);}
    .p-play:active{transform:scale(.97);}
    .player-right{display:flex;align-items:center;justify-content:flex-end;gap:12px;}
    .player-right .icon-btn{width:38px;height:38px;background:transparent;border-color:transparent;color:var(--muted);}
    .player-right .icon-btn:hover{color:var(--text);background:rgba(255,255,255,.06);}
    .vol-cont{display:flex;align-items:center;gap:8px;}
    .vol-cont i{color:var(--muted);font-size:.9rem;}
    input[type=range].vol{-webkit-appearance:none;appearance:none;width:100px;height:5px;border-radius:10px;background:linear-gradient(90deg,var(--accent) var(--vol,80%),#2a3040 var(--vol,80%));cursor:pointer;}
    input[type=range].vol::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.4);}
    input[type=range].vol::-moz-range-thumb{width:13px;height:13px;border:none;border-radius:50%;background:#fff;}
    .live-badge{display:inline-flex;align-items:center;gap:5px;font-size:.66rem;font-weight:800;color:var(--accent);letter-spacing:.06em;}
    .live-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 1.4s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

    /* FULL PLAYER */
    .full-player{position:fixed;inset:0;z-index:900;display:flex;flex-direction:column;background:var(--bg);transform:translateY(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);overflow:hidden;}
    .full-player.open{transform:translateY(0);}
    .fp-bg{position:absolute;inset:0;z-index:0;transition:background .5s ease;}
    .fp-bg-img{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(70px) saturate(1.5) brightness(.6);transform:scale(1.4);opacity:.4;z-index:0;transition:background-image .4s;}
    .fp-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(11,14,20,.28),rgba(11,14,20,.6) 55%,rgba(11,14,20,.96));}
    .fp-inner{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;padding:22px 24px calc(28px + env(safe-area-inset-bottom));max-width:560px;width:100%;margin:0 auto;}
    .fp-top{display:flex;align-items:center;justify-content:space-between;}
    .fp-top .lbl{font-size:.72rem;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);font-weight:700;}
    .fp-close{width:42px;height:42px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;cursor:pointer;font-size:1.1rem;}
    .fp-art-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:20px 0;min-height:0;perspective:1100px;}
    .fp-art{width:min(72vw,320px);max-height:38vh;aspect-ratio:1/1;border-radius:22px;object-fit:cover;box-shadow:0 30px 70px rgba(0,0,0,.55);background:rgba(255,255,255,.04);transform-origin:center center;will-change:transform;}
    .fp-art.beating{animation:fpDance 2.4s ease-in-out infinite;}
    @keyframes fpDance{0%{transform:translateY(0) rotateY(0) scale(1);}15%{transform:translateY(-10px) rotateY(13deg) scale(1.03);}30%{transform:translateY(0) rotateY(0) scale(1);}45%{transform:translateY(-6px) rotateY(-13deg) scale(1.02);}60%{transform:translateY(0) rotateY(0) scale(1);}75%{transform:translateY(-4px) rotateY(6deg) scale(1.015);}100%{transform:translateY(0) rotateY(0) scale(1);}}
    /* WAVE música */
    .wave{display:flex;align-items:center;justify-content:center;gap:3px;height:46px;margin:6px 0 14px;}
    .wave span{width:4px;min-height:4px;border-radius:4px;background:linear-gradient(180deg,var(--wave-c1,var(--accent)),var(--wave-c2,var(--accent-strong)));opacity:.9;height:20%;transition:height .1s;}
    .wave.playing span{animation:waveA 1s ease-in-out infinite;}
    @keyframes waveA{0%,100%{height:15%;}50%{height:100%;}}
    .fp-meta{text-align:center;}
    .fp-meta h1{font-size:1.7rem;font-weight:800;letter-spacing:-.5px;line-height:1.1;margin-bottom:6px;}
    .fp-meta p{color:var(--muted);font-size:.95rem;font-weight:500;}
    .fp-genre{color:var(--accent);font-size:.85rem;margin-top:6px;font-weight:600;}
    .fp-socials{display:flex;gap:10px;margin:16px 0;flex-wrap:wrap;justify-content:center;}
    .fp-socials a{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.08);display:grid;place-items:center;color:#fff;font-size:1rem;transition:background .18s,transform .1s;}
    .fp-socials a:hover{background:var(--accent);color:#04121a;transform:translateY(-2px);}
    .fp-controls{display:flex;align-items:center;justify-content:center;gap:30px;margin-top:4px;}
    .fp-controls .btn-nav{font-size:1.5rem;color:#fff;}
    .fp-play{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-strong));color:#04121a;border:none;font-size:1.5rem;cursor:pointer;display:grid;place-items:center;transition:transform .12s;box-shadow:0 10px 28px rgba(34,211,238,.5);}
    .fp-play:hover{transform:scale(1.05);}
    .fp-actions{display:flex;align-items:center;justify-content:space-between;margin-top:22px;gap:14px;}
    .fp-actions .a-btn{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid var(--border);color:#fff;padding:10px 18px;border-radius:30px;cursor:pointer;font-family:var(--font-body);font-weight:600;font-size:.85rem;transition:background .18s;}
    .fp-actions .a-btn:hover{background:rgba(255,255,255,.12);}
    .fp-actions .a-btn.on{color:var(--accent);}
    .fp-vol{flex:1;display:flex;align-items:center;gap:10px;max-width:200px;}

    /* MODAL */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
    .overlay.show{display:flex;}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:30px;width:100%;max-width:360px;text-align:center;}
    .modal h3{font-size:1.3rem;margin-bottom:6px;}
    .modal p{color:var(--muted);font-size:.88rem;margin-bottom:20px;}
    .modal input{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:14px;color:#fff;font-size:1.3rem;text-align:center;letter-spacing:.5em;font-family:var(--font);}
    .modal input:focus{outline:none;border-color:var(--accent);}

    .modal-btns button{flex:1;padding:13px;border-radius:12px;border:none;cursor:pointer;font-family:var(--font-body);font-weight:700;font-size:.9rem;}
    .btn-cancel{background:var(--surface-2);color:var(--text);}
    .btn-ok{background:var(--accent);color:#04121a;}

    .stream-toast{position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:104px;background:#2a1420;border:1px solid #ff5c7a55;color:#ffb3c4;z-index:850;padding:12px 18px;border-radius:14px;font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:10px;box-shadow:0 12px 30px rgba(0,0,0,.5);opacity:0;visibility:hidden;pointer-events:none;transition:transform .4s cubic-bezier(.4,0,.2,1),opacity .3s,visibility .3s;max-width:90vw;}
    .stream-toast.show{transform:translateX(-50%) translateY(0);opacity:1;visibility:visible;pointer-events:auto;}

    .admin-key{position:fixed;top:10px;left:10px;z-index:1200;width:30px;height:30px;border:none;cursor:pointer;background:transparent;color:var(--muted);opacity:.13;transition:opacity .25s,transform .25s;display:flex;align-items:center;justify-content:center;font-size:.9rem;padding:0;}
    .admin-key:hover{opacity:.9;transform:rotate(-15deg);}
    .wa-fab{position:fixed;right:18px;bottom:112px;z-index:600;display:inline-flex;align-items:center;height:54px;border-radius:30px;background:#25D366;color:#fff;box-shadow:0 6px 20px rgba(37,211,102,.5);overflow:hidden;transition:padding .3s,box-shadow .2s,transform .12s;}
    .wa-fab i{font-size:1.7rem;width:54px;min-width:54px;height:54px;display:flex;align-items:center;justify-content:center;}
    .wa-fab-label{max-width:0;opacity:0;white-space:nowrap;font-weight:700;font-size:.85rem;transition:max-width .35s,opacity .25s,padding .35s;}
    .wa-fab:hover{padding-right:18px;}
    .wa-fab:hover .wa-fab-label{max-width:170px;opacity:1;padding-right:4px;}
    .wa-fab:active{transform:scale(.95);}

    .scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(2px);z-index:449;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s;}
    .scrim.show{opacity:1;visibility:visible;}

    /* RESPONSIVE */
    .fa-spin{animation:fa-spin .8s linear infinite;}
    @keyframes fa-spin{100%{transform:rotate(360deg);}}

    @media(max-width:900px){
      html,body{height:auto;overflow-x:hidden;overflow-y:auto;}
      .app{display:block;height:auto;min-height:auto;padding:0 0 calc(96px + env(safe-area-inset-bottom));}
      .sidebar{position:fixed;top:0;left:0;bottom:0;width:82vw;max-width:310px;z-index:1500;border-radius:0 20px 20px 0;transform:translateX(-105%);}
      .sidebar.open{transform:translateX(0);box-shadow:0 0 60px rgba(0,0,0,.6);}
      .side-close{display:block;}
      .main{border-radius:0;border:none;min-height:auto;background:var(--bg);overflow:visible;display:block;}
      .topbar{padding:12px 14px;gap:10px;flex-wrap:wrap;}
      .hamburger{display:grid;place-items:center;}
      .mobile-brand{display:flex;flex:1;}
      .search-box{max-width:none;flex-basis:100%;order:5;}
      .search-box input{padding:11px 42px 11px 42px;font-size:.9rem;}
      .content{padding:4px 14px 20px;overflow:visible;height:auto;}
      .hero{min-height:auto;margin:6px 0 20px;}
      .hero-inner{max-width:100%;padding:22px 18px;}
      .hero h1{font-size:1.6rem;}
      .hero p{font-size:.85rem;-webkit-line-clamp:2;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden;}
      .hero-art{display:none;}
      .section-head h2{font-size:1.2rem;}
      #mobileChips{display:flex!important;flex-wrap:nowrap;overflow-x:auto;gap:8px;padding-bottom:8px;margin-bottom:14px;scrollbar-width:none;}
      #mobileChips::-webkit-scrollbar{display:none;}
      .chip{flex:0 0 auto;padding:7px 14px;font-size:.8rem;}
      .radio-grid{grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;}
      .radio-card{padding:8px;}
      .radio-card:hover{transform:none;}
      .card-title{font-size:.8rem;}
      .card-meta{font-size:.68rem;}
      .card-fav{opacity:1;transform:scale(1);width:28px;height:28px;font-size:.7rem;}
      .card-play{opacity:1;transform:none;width:36px;height:36px;font-size:.82rem;}
      .card-country{font-size:.56rem;padding:2px 6px;}
      .player-bar{left:0;right:0;bottom:0;border-radius:18px 18px 0 0;grid-template-columns:1fr auto;height:70px;padding:0 12px;gap:10px;border-left:none;border-right:none;}
      .player-bar .player-right{display:none;}
      .track-info .art{width:46px;height:46px;}
      .track-info b{font-size:.85rem;}
      .track-info .fav-mini{display:none;}
      .controls{gap:14px;}
      .controls .btn-nav.prev{display:none;}
      .p-play{width:48px;height:48px;font-size:1.1rem;}
      .wa-fab{right:14px;bottom:88px;height:48px;}

      .admin-key{top:auto;bottom:88px;left:14px;opacity:.16;}

      .fp-art{width:auto;height:auto;max-width:min(70vw,300px);max-height:100%;aspect-ratio:1/1;}
      .wave{height:30px;margin:4px 0 6px;flex:0 0 auto;}
      .fp-socials{margin:8px 0;flex:0 0 auto;}
      .fp-meta{flex:0 0 auto;}
      .fp-meta h1{font-size:1.3rem;}
      .fp-controls{gap:24px;margin-top:2px;flex:0 0 auto;}
      .fp-play{width:60px;height:60px;}
      .fp-actions{flex-wrap:wrap;margin-top:12px;flex:0 0 auto;}
      .fp-vol{order:3;max-width:none;flex-basis:100%;margin-top:10px;}
    }
    @media(max-width:380px){.radio-grid{grid-template-columns:repeat(2,minmax(0,1fr));}}
  </style>
</head>
<body>
  <div class="scrim" id="scrim"></div>
  <div class="app">

        <button class="nav-item" data-view="search" data-testid="nav-search"><i class="fas fa-magnifying-glass"></i> Buscar</button>

        <div class="side-label">Tu música</div>
        <button class="nav-item" data-view="favorites" data-testid="nav-favorites"><i class="fas fa-heart"></i> Favoritos</button>
        <button class="nav-item" data-view="history" data-testid="nav-history"><i class="fas fa-clock-rotate-left"></i> Historial</button>

      </div>
      <div class="side-foot">
        <button class="side-btn install" id="pwaInstall" data-testid="install-btn"><i class="fas fa-download"></i> Instalar app</button>
      </div>
    </aside>

    <section class="main">
      <header class="topbar">
        <button class="hamburger" id="hamburger" data-testid="hamburger-btn"><i class="fas fa-bars"></i></button>
        <div class="mobile-brand">
          <div class="logo" id="logoTextMobile">Multi<span>RADIOS</span></div>
          <img class="logo-img" id="logoImgMobile" alt="logo">
        </div>
        <div class="search-box">
          <i class="fas fa-magnifying-glass s-ico"></i>
          <input type="text" id="searchInput" placeholder="Buscar emisora, ciudad o país…" data-testid="search-input">
          <i class="fas fa-microphone mic"></i>
        </div>
        <div class="topbar-spacer"></div>

      </header>

      <div class="content" id="content">
        <div class="hero" id="hero" style="display:none">
          <div class="hero-bg" id="heroBg"></div>
          <div class="hero-inner">
            <div class="tag" id="heroTag">Emisora destacada</div>
            <h1 id="heroTitle">—</h1>
            <p id="heroDesc">—</p>
            <div class="hero-btns">
              <button class="btn-listen" id="heroListen" data-testid="hero-listen-btn"><i class="fas fa-play"></i> Escuchar</button>
              <button class="btn-bookmark" id="heroFav" data-testid="hero-fav-btn"><i class="far fa-bookmark"></i></button>
            </div>
          </div>
          <img class="hero-art" id="heroArt" alt="destacada">
        </div>

        <div class="chips" id="mobileChips" style="display:none"></div>

        <div class="section-head">
          <div>
            <h2 id="sectionTitle">Todas las emisoras</h2>
            <div class="sub" id="sectionSub">Radio en vivo · sin cortes</div>
          </div>
        </div>
        <div class="radio-grid" id="radioGrid"></div>
      </div>
    </section>
  </div>

  <div class="player-bar" id="playerBar">
    <div class="track-info" id="barTrackInfo" data-testid="player-track-info">
      <img class="art" id="pImg" src="icon-192.png" alt="cover">
      <div class="txt">
        <b id="pTitle">Selecciona una emisora</b>
        <span id="pGenre"></span>
      </div>
      <button class="fav-mini" id="barFav" data-testid="player-fav-btn"><i class="far fa-heart"></i></button>
    </div>
    <div class="controls">
      <button class="btn-nav prev" onclick="next(-1)" data-testid="player-prev-btn"><i class="fas fa-backward-step"></i></button>
      <button class="p-play" id="playBtn" onclick="toggle()" data-testid="player-play-btn"><i class="fas fa-play" id="playIcon"></i></button>
      <button class="btn-nav next" onclick="next(1)" data-testid="player-next-btn"><i class="fas fa-forward-step"></i></button>
    </div>
    <div class="player-right">
      <button class="icon-btn" id="barShare" title="Compartir" data-testid="player-share-btn"><i class="fas fa-share-nodes"></i></button>
      <div class="vol-cont"><i class="fas fa-volume-high"></i><input type="range" class="vol" id="vol" min="0" max="1" step="0.01" value="0.8" data-testid="volume-slider"></div>
      <button class="icon-btn" id="barExpand" title="Pantalla completa" data-testid="player-expand-btn"><i class="fas fa-up-right-and-down-left-from-center"></i></button>

  <div class="full-player" id="fullPlayer" data-testid="full-player">
    <div class="fp-bg" id="fpBg"></div>
    <div class="fp-bg-img" id="fpBgImg"></div>
    <div class="fp-inner">
      <div class="fp-top">
        <span class="lbl">Reproduciendo en vivo</span>
        <button class="fp-close" id="fpClose" data-testid="fp-close-btn"><i class="fas fa-chevron-down"></i></button>
      </div>
      <div class="fp-art-wrap"><img class="fp-art" id="fpArt" src="icon-512.png" alt="cover"></div>
      <div class="wave" id="wave"></div>
      <div class="fp-meta">
        <h1 id="fpTitle">—</h1>
        <p id="fpSub">—</p>
        <div class="fp-genre" id="fpGenre"></div>
      </div>
      <div class="fp-socials" id="fpSocials"></div>
      <div class="fp-controls">
        <button class="btn-nav" onclick="next(-1)" data-testid="fp-prev-btn"><i class="fas fa-backward-step"></i></button>
        <button class="fp-play" onclick="toggle()" data-testid="fp-play-btn"><i class="fas fa-play" id="fpPlayIcon"></i></button>
        <button class="btn-nav" onclick="next(1)" data-testid="fp-next-btn"><i class="fas fa-forward-step"></i></button>
      </div>
      <div class="fp-actions">
        <button class="a-btn" id="fpFav" data-testid="fp-fav-btn"><i class="far fa-heart"></i> Favorito</button>
        <div class="fp-vol"><i class="fas fa-volume-high" style="color:var(--muted)"></i><input type="range" class="vol" id="fpVol" min="0" max="1" step="0.01" value="0.8" data-testid="fp-volume-slider"></div>
        <button class="a-btn" id="fpShare" data-testid="fp-share-btn"><i class="fas fa-share-nodes"></i> Compartir</button>
      </div>
    </div>
  </div>

  <audio id="audio" preload="none"></audio>
  <a class="wa-fab" id="waFab" target="_blank" rel="noopener" title="Agrega tu radio por WhatsApp" data-testid="whatsapp-fab">
    <i class="fab fa-whatsapp"></i><span class="wa-fab-label" id="waFabLabel">Agrega tu radio</span>
  </a>
  <div class="stream-toast" id="streamToast"><i class="fas fa-triangle-exclamation"></i><span id="streamToastMsg"></span></div>

  <script>
    const STORAGE_KEY='multiradios_data_v1';
    const FAVS_KEY='mr_favs', HIST_KEY='mr_history';
    const PROXY_BASE='', SHARE_ENDPOINT='/api/share/', PLACEHOLDER='icon-192.png';

    let data={site:{},theme:{},banners:[],stations:[]};
    let view={list:[]}, index=-1, currentView='home', countryFilter='';
    let userPaused=false, connecting=false, connectTimer=null;
    let favs=load(FAVS_KEY), history=load(HIST_KEY);
    const audio=document.getElementById('audio');
    const SOCIAL_ICONS={facebook:'fab fa-facebook-f',instagram:'fab fa-instagram',twitter:'fab fa-x-twitter',youtube:'fab fa-youtube',tiktok:'fab fa-tiktok',whatsapp:'fab fa-whatsapp',telegram:'fab fa-telegram',spotify:'fab fa-spotify',website:'fas fa-globe'};

    function load(k){try{return JSON.parse(localStorage.getItem(k)||'[]');}catch(_){return[];}}
    function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(_){}}
    function slugify(s){return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')||'radio';}
    function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
    function isFav(n){return favs.includes(slugify(n));}
    function toggleFav(n){const s=slugify(n),i=favs.indexOf(s);if(i===-1)favs.push(s);else favs.splice(i,1);save(FAVS_KEY,favs);loadGrid(document.getElementById('searchInput').value);syncFav();renderHero();}
    function addHistory(n){const s=slugify(n);history=history.filter(x=>x!==s);history.unshift(s);history=history.slice(0,20);save(HIST_KEY,history);}

    /* THEME */
    function applyTheme(t={}){
      const r=document.documentElement;
      if(t.primary){r.style.setProperty('--accent',t.primary);}
      if(t.accent){r.style.setProperty('--accent-strong',t.accent);}else if(t.primary){r.style.setProperty('--accent-strong',t.primary);}
      if(t.background){r.style.setProperty('--bg',t.background);document.getElementById('metaThemeColor').setAttribute('content',t.background);}
      if(t.surface)r.style.setProperty('--surface',t.surface);
      if(t.light)r.style.setProperty('--surface-2',t.light);
      if(t.textDark)r.style.setProperty('--text',t.textDark);
      if(t.textMuted)r.style.setProperty('--muted',t.textMuted);
      if(t.border)r.style.setProperty('--border',t.border);
      if(t.playerBg)r.style.setProperty('--player-bg',t.playerBg);
      if(t.primary)r.style.setProperty('--accent-soft',hexToRgba(t.primary,.14));
      if(t.font){const f=t.font.replace(/ /g,'+');document.getElementById('fontLink').href=`https://fonts.googleapis.com/css2?family=${f}:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap`;r.style.setProperty('--font',`'${t.font}', sans-serif`);}
    }
    function hexToRgba(h,a){h=h.replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');const n=parseInt(h,16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}
    function applySite(s={}){
      if(s.title)document.title=s.title;
      if(s.favicon)document.getElementById('faviconLink').href=s.favicon;
      const li=document.getElementById('logoImg'),lt=document.getElementById('logoText'),lim=document.getElementById('logoImgMobile'),ltm=document.getElementById('logoTextMobile');
      if(s.logoImage){li.src=s.logoImage;li.style.display='block';lt.style.display='none';lim.src=s.logoImage;lim.style.display='block';ltm.style.display='none';}
      else{const h=`${s.logoText||'Multi'}<span>${s.logoAccent||'RADIOS'}</span>`;li.style.display='none';lt.style.display='block';lt.innerHTML=h;lim.style.display='none';ltm.style.display='block';ltm.innerHTML=h;}
      const wa=document.getElementById('waFab');
      const num=String(s.whatsapp==null?'34604875068':s.whatsapp).replace(/[^0-9]/g,'');
      const msg=s.whatsappText||'¡Hola! Quiero agregar mi radio a MultiRadios 📻';
      if(num){wa.href='https://wa.me/'+num+'?text='+encodeURIComponent(msg);wa.style.display='inline-flex';document.getElementById('waFabLabel').innerText=s.whatsappLabel||'Agrega tu radio';}
      else wa.style.display='none';
    }

    /* DATA */
    async function loadData(){
      try{const r=await fetch('radios.json?v='+Date.now(),{cache:'no-store'});if(r.ok)return norm(await r.json());}catch(e){}
      try{const c=localStorage.getItem(STORAGE_KEY);if(c){const p=JSON.parse(c);if(p&&(p.stations||p.banners))return norm(p);}}catch(e){}
      return norm({});
    }
    function norm(d){
      const o={site:d.site||{},theme:d.theme||{},banners:Array.isArray(d.banners)?d.banners:[],stations:Array.isArray(d.stations)?d.stations:[]};
      o.stations=o.stations.filter(s=>s&&s.name&&s.url).map(s=>({name:String(s.name).trim(),url:String(s.url).trim(),img:s.img||PLACEHOLDER,genre:s.genre||'',country:(s.country||'').trim(),city:(s.city||'').trim(),countryKey:canon(s.country),desc:s.desc||s.description||'',proxy:!!s.proxy,socials:s.socials||{}}));
      return o;
    }
    function canon(c){const k=String(c||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();if(!k)return'OTHER';if(/^(py|par|paraguay)/.test(k))return'PY';if(/^(ar|arg|argentina)/.test(k))return'AR';if(/^(es|esp|espana|spain)/.test(k))return'ES';if(/^(fr|fra|francia|france)/.test(k))return'FR';if(/^(us|usa|eeuu|estados)/.test(k))return'US';if(/^(uy|uru|uruguay)/.test(k))return'UY';if(/^(br|bra|brasil|brazil)/.test(k))return'BR';if(/^(mx|mex|mexico)/.test(k))return'MX';if(/^(co|col|colombia)/.test(k))return'CO';if(/^(cl|chi|chile)/.test(k))return'CL';if(/^(pe|per|peru)/.test(k))return'PE';return String(c).trim().toUpperCase().slice(0,3);}
    function cName(c){const m={PY:'Paraguay',AR:'Argentina',ES:'España',FR:'Francia',US:'EE.UU.',UY:'Uruguay',BR:'Brasil',MX:'México',CO:'Colombia',CL:'Chile',PE:'Perú',OTHER:'Otros'};const k=String(c||'').trim().toUpperCase();return m[k]||(c?String(c).trim():'Otros');}

    /* COUNTRIES */
    function renderCountries(){
      const counts={};data.stations.forEach(s=>{const c=s.countryKey||'OTHER';counts[c]=(counts[c]||0)+1;});
      const keys=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
      let html=`<button class="country-btn ${countryFilter===''?'active':''}" data-c="" data-testid="country-all"><span>Todas</span><span class="cnt">${data.stations.length}</span></button>`;
      keys.forEach(c=>html+=`<button class="country-btn ${countryFilter===c?'active':''}" data-c="${esc(c)}" data-testid="country-${slugify(c)}"><span>${esc(cName(c))}</span><span class="cnt">${counts[c]}</span></button>`);
      const list=document.getElementById('countryList');list.innerHTML=html;
      list.querySelectorAll('.country-btn').forEach(b=>b.onclick=()=>{countryFilter=b.dataset.c;setView('stations');renderCountries();loadGrid(document.getElementById('searchInput').value);closeSidebar();});
      const chips=document.getElementById('mobileChips');
      chips.innerHTML=`<button class="chip ${countryFilter===''?'active':''}" data-c="">Todas</button>`+keys.map(c=>`<button class="chip ${countryFilter===c?'active':''}" data-c="${esc(c)}">${esc(cName(c))}</button>`).join('');
      chips.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{countryFilter=b.dataset.c;renderCountries();loadGrid(document.getElementById('searchInput').value);});
    }

    /* HERO */
    function renderHero(){
      const hero=document.getElementById('hero');
      if(currentView!=='home'||!data.stations.length){hero.style.display='none';return;}
      const s=index!==-1?data.stations[index]:data.stations[0];
      if(!s){hero.style.display='none';return;}
      hero.dataset.i=data.stations.indexOf(s);
      hero.style.display='flex';
      document.getElementById('heroTag').innerText=index!==-1?'Reproduciendo ahora':'Emisora destacada';
      document.getElementById('heroTitle').innerText=s.name;
      const meta=[s.city,cName(s.countryKey)].filter(Boolean).join(', ');
      document.getElementById('heroDesc').innerText=s.desc||`${s.genre?s.genre+' · ':''}Escucha ${s.name} en vivo${meta?' desde '+meta:''}. Radio online sin cortes, la mejor calidad directo a tus oídos.`;
      const art=document.getElementById('heroArt');art.onerror=function(){this.onerror=null;this.src=PLACEHOLDER;};art.src=s.img||PLACEHOLDER;
      document.getElementById('heroBg').style.backgroundImage=`url('${(s.img||PLACEHOLDER).replace(/'/g,'')}')`;
      const hf=document.getElementById('heroFav');
      if(isFav(s.name)){hf.classList.add('on');hf.innerHTML='<i class="fas fa-bookmark"></i>';}else{hf.classList.remove('on');hf.innerHTML='<i class="far fa-bookmark"></i>';}
    }

    /* GRID */
    function currentList(q=''){
      let list=data.stations.map((s,i)=>({s,i}));
      if(currentView==='favorites')list=list.filter(x=>isFav(x.s.name));
      else if(currentView==='history'){const order={};history.forEach((h,idx)=>order[h]=idx);list=list.filter(x=>history.includes(slugify(x.s.name))).sort((a,b)=>order[slugify(a.s.name)]-order[slugify(b.s.name)]);}
      if(countryFilter)list=list.filter(x=>(x.s.countryKey||'OTHER')===countryFilter);
      q=(q||'').trim().toLowerCase();
      if(q)list=list.filter(x=>{const s=x.s;return (s.name+' '+s.city+' '+s.country+' '+s.genre).toLowerCase().includes(q);});
      return list;
    }
    function loadGrid(q=''){
      const grid=document.getElementById('radioGrid');const list=currentList(q);view.list=list;
      if(!list.length){
        let msg=currentView==='favorites'?'Aún no tienes favoritos. Pulsa el corazón en una emisora.':currentView==='history'?'Todavía no has escuchado ninguna emisora.':'No se encontraron emisoras.';
        grid.innerHTML=`<div class="empty-state"><i class="fas ${currentView==='favorites'?'fa-heart-crack':currentView==='history'?'fa-clock-rotate-left':'fa-magnifying-glass'}"></i><p>${msg}</p></div>`;return;
      }
      grid.innerHTML=list.map(({s,i})=>{
        const meta=[s.city,cName(s.countryKey)].filter(Boolean).join(' · ')||'En vivo';
        const active=i===index,playing=active&&!audio.paused&&!!audio.src&&!userPaused;
        const cIcon=(active&&connecting)?'fa-spinner fa-spin':(playing?'fa-pause':'fa-play');
        return `<div class="radio-card ${active?'active':''} ${playing?'playing':''}" data-i="${i}" data-testid="radio-card-${i}">
          <div class="card-art">
            <img src="${esc(s.img)}" loading="lazy" alt="${esc(s.name)}" onerror="this.onerror=null;this.src='${PLACEHOLDER}'">
            ${s.countryKey&&s.countryKey!=='OTHER'?`<span class="card-country">${esc(s.countryKey)}</span>`:''}
            <button class="card-fav ${isFav(s.name)?'on':''}" data-fav="${i}" data-testid="card-fav-${i}"><i class="${isFav(s.name)?'fas':'far'} fa-heart"></i></button>
            <div class="eq"><span></span><span></span><span></span><span></span></div>
            <button class="card-play" data-play="${i}" data-testid="card-play-${i}"><i class="fas ${cIcon}"></i></button>
          </div>
          <div class="card-title">${esc(s.name)}</div>
          <div class="card-meta">${esc(meta)}</div>
        </div>`;
      }).join('');
      grid.querySelectorAll('.radio-card').forEach(card=>{const i=+card.dataset.i;card.onclick=(e)=>{if(e.target.closest('[data-fav]'))return;handlePlay(i);if(!e.target.closest('[data-play]'))openFull();};});
      grid.querySelectorAll('[data-fav]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();toggleFav(data.stations[+b.dataset.fav].name);});
    }
    function handlePlay(i){if(i===index&&!userPaused&&!audio.paused&&audio.src){toggle();}else{play(i);}}

    /* HLS/AUDIO */
    let hls=null,hlsRetries=0;
    function destroyHls(){if(hls){try{hls.destroy();}catch(_){}hls=null;}}
    function isHls(u){try{const c=String(u).split('?')[0].toLowerCase();return c.endsWith('.m3u8')||c.includes('.m3u8');}catch(_){return false;}}
    function nativeHls(){return audio.canPlayType('application/vnd.apple.mpegurl')!==''||audio.canPlayType('application/x-mpegURL')!=='';}
    function buildUrl(s,fp){let src=s.url;if((s.proxy||fp)&&PROXY_BASE)src=PROXY_BASE.replace(/\/$/,'')+'/stream?url='+encodeURIComponent(src);if(!isHls(src)){const sep=src.includes('?')?'&':'?';src=src+sep+'_cb='+Date.now();}return src;}
    function stopStream(){setConnecting(false);destroyHls();try{audio.pause();}catch(_){}audio.removeAttribute('src');audio.src='';try{audio.load();}catch(_){}}
    function playHls(url,s){
      hls=new Hls({enableWorker:true,lowLatencyMode:false,backBufferLength:30,maxBufferLength:30,manifestLoadingTimeOut:20000,manifestLoadingMaxRetry:6,manifestLoadingRetryDelay:1000,levelLoadingTimeOut:20000,levelLoadingMaxRetry:6,fragLoadingTimeOut:30000,fragLoadingMaxRetry:8,fragLoadingRetryDelay:1000});
      hls.loadSource(url);hls.attachMedia(audio);
      hls.on(Hls.Events.MANIFEST_PARSED,()=>{hlsRetries=0;audio.play().catch(()=>{});});
      hls.on(Hls.Events.ERROR,(e,err)=>{if(!err||!err.fatal)return;
        if(err.type===Hls.ErrorTypes.NETWORK_ERROR){if(hlsRetries<3){hlsRetries++;setTimeout(()=>{if(hls)hls.startLoad();},1000);return;}destroyHls();if(nativeHls()){audio.src=url;audio.load();audio.play().catch(()=>{});}else if(PROXY_BASE&&!s._proxied){s._proxied=true;startStream(s,true);}else{setConnecting(false);showErr('No se pudo conectar con la emisora (red).');}return;}
        if(err.type===Hls.ErrorTypes.MEDIA_ERROR){try{hls.recoverMediaError();}catch(_){destroyHls();setConnecting(false);showErr('Formato de audio no soportado.');}return;}
        destroyHls();setConnecting(false);showErr('No se pudo reproducir esta emisora.');});
    }
    function startStream(s,fp){userPaused=false;destroyHls();hlsRetries=0;setConnecting(true);audio.crossOrigin=null;const url=buildUrl(s,fp);
      if(isHls(url)){if(nativeHls()){audio.src=url;audio.load();audio.play().catch(()=>{});return;}if(window.Hls&&Hls.isSupported()){playHls(url,s);return;}}
      audio.src=url;audio.load();audio.play().catch(()=>{});}

    function play(i){
      index=i;const s=data.stations[index];if(!s)return;delete s._proxied;
      stopStream();startStream(s);addHistory(s.name);
      const bi=document.getElementById('pImg');bi.onerror=function(){this.onerror=null;this.src=PLACEHOLDER;};bi.src=s.img||PLACEHOLDER;
      document.getElementById('pTitle').innerText=s.name;
      document.getElementById('pGenre').innerHTML=`<span class="live-badge"><span class="dot"></span>EN VIVO</span> ${esc([s.city,cName(s.countryKey)].filter(Boolean).join(' · '))}`;
      loadGrid(document.getElementById('searchInput').value);renderHero();
      if(document.getElementById('fullPlayer').classList.contains('open'))updateFull();
      syncIcons();syncFav();
      if('mediaSession'in navigator){navigator.mediaSession.metadata=new MediaMetadata({title:s.name,artist:data.site.footerText||'MultiRadios.es',artwork:[{src:s.img,sizes:'512x512',type:'image/png'}]});navigator.mediaSession.setActionHandler('play',()=>{if(userPaused||audio.paused)toggle();});navigator.mediaSession.setActionHandler('pause',()=>{if(!audio.paused)toggle();});navigator.mediaSession.setActionHandler('previoustrack',()=>next(-1));navigator.mediaSession.setActionHandler('nexttrack',()=>next(1));}
    }
    function toggle(){if(index===-1){if(data.stations.length){play(0);openFull();}return;}const s=data.stations[index];if(userPaused||audio.paused||!audio.src){startStream(s);}else{userPaused=true;stopStream();}syncIcons();}
    function next(d){const list=view.list.length?view.list:data.stations.map((s,i)=>({s,i}));if(!list.length)return;let p=list.findIndex(x=>x.i===index);p=(p+d+list.length)%list.length;play(list[p].i);}
    function setConnecting(on){connecting=on;if(connectTimer){clearTimeout(connectTimer);connectTimer=null;}if(on){connectTimer=setTimeout(()=>{if(connecting&&audio.paused){setConnecting(false);showErr('No se pudo conectar con la emisora. Intenta de nuevo.');}},16000);}syncIcons();}
    function showErr(m){const t=document.getElementById('streamToast');document.getElementById('streamToastMsg').innerText=m;t.classList.add('show');clearTimeout(showErr._t);showErr._t=setTimeout(()=>t.classList.remove('show'),4500);}
    function syncIcons(){
      const pi=document.getElementById('playIcon'),fi=document.getElementById('fpPlayIcon'),fa=document.getElementById('fpArt'),ba=document.getElementById('pImg'),wv=document.getElementById('wave');
      if(connecting){pi.className='fas fa-spinner fa-spin';fi.className='fas fa-spinner fa-spin';fa.classList.remove('beating');wv.classList.remove('playing');loadGrid(document.getElementById('searchInput').value);return;}
      const playing=!audio.paused&&!!audio.src&&!userPaused;const cls=playing?'fa-pause':'fa-play';
      pi.className='fas '+cls;fi.className='fas '+cls;fa.classList.toggle('beating',playing);wv.classList.toggle('playing',playing);
      loadGrid(document.getElementById('searchInput').value);
    }
    function syncFav(){const s=data.stations[index],bf=document.getElementById('barFav'),ff=document.getElementById('fpFav');if(s&&isFav(s.name)){bf.classList.add('on');bf.innerHTML='<i class="fas fa-heart"></i>';ff.classList.add('on');ff.innerHTML='<i class="fas fa-heart"></i> Favorito';}else{bf.classList.remove('on');bf.innerHTML='<i class="far fa-heart"></i>';ff.classList.remove('on');ff.innerHTML='<i class="far fa-heart"></i> Favorito';}}

    audio.addEventListener('playing',()=>setConnecting(false));
    audio.addEventListener('canplay',()=>setConnecting(false));
    audio.addEventListener('play',syncIcons);
    audio.addEventListener('pause',syncIcons);
    audio.addEventListener('error',()=>{if(userPaused||!audio.src)return;const s=data.stations[index];if(!s||hls)return;setTimeout(()=>{if(!userPaused)startStream(s);},900);});
    window.addEventListener('pagehide',stopStream);

    /* WAVE bars */
    function buildWave(){const w=document.getElementById('wave');let h='';for(let i=0;i<36;i++){h+=`<span style="animation-delay:${(Math.random()*1).toFixed(2)}s;animation-duration:${(0.7+Math.random()*0.7).toFixed(2)}s"></span>`;}w.innerHTML=h;}

    /* FULL PLAYER */
    function renderSocials(soc={}){const box=document.getElementById('fpSocials');const en=Object.entries(soc).filter(([k,v])=>v&&SOCIAL_ICONS[k]);box.innerHTML=en.map(([k,v])=>{let href=v;if(k==='whatsapp'&&!/^https?:/.test(v))href='https://wa.me/'+String(v).replace(/[^0-9]/g,'');return `<a href="${esc(href)}" target="_blank" rel="noopener" title="${k}" data-testid="social-${k}"><i class="${SOCIAL_ICONS[k]}"></i></a>`;}).join('');box.style.display=en.length?'flex':'none';}
    function extractColor(url){return new Promise(res=>{if(!url){res(null);return;}const img=new Image();img.crossOrigin='anonymous';img.onload=()=>{try{const c=document.createElement('canvas'),w=c.width=48,h=c.height=48,ctx=c.getContext('2d');ctx.drawImage(img,0,0,w,h);const d=ctx.getImageData(0,0,w,h).data;let r=0,g=0,b=0,n=0,best=null,bs=-1;for(let i=0;i<d.length;i+=4){if(d[i+3]<125)continue;const R=d[i],G=d[i+1],B=d[i+2];r+=R;g+=G;b+=B;n++;const mx=Math.max(R,G,B),mn=Math.min(R,G,B),sat=mx===0?0:(mx-mn)/mx,sc=sat*(mx/255);if(sc>bs){bs=sc;best={r:R,g:G,b:B};}}if(!n)return res(null);res(bs>0.18?best:{r:Math.round(r/n),g:Math.round(g/n),b:Math.round(b/n)});}catch(e){res(null);}};img.onerror=()=>res(null);img.src=url;});}
    async function applyFpColor(url){
      const bg=document.getElementById('fpBg'),wv=document.getElementById('wave');
      const col=await extractColor(url);
      if(col){
        const dk=v=>Math.round(v*0.7);
        bg.style.background=`radial-gradient(120% 90% at 50% 0%, rgb(${dk(col.r)},${dk(col.g)},${dk(col.b)}) 0%, rgba(${col.r},${col.g},${col.b},0.28) 34%, var(--bg) 82%)`;
        const br=v=>Math.min(255,Math.round(v+(255-v)*0.35));
        wv.style.setProperty('--wave-c1',`rgb(${br(col.r)},${br(col.g)},${br(col.b)})`);
        wv.style.setProperty('--wave-c2',`rgb(${col.r},${col.g},${col.b})`);
      }else{
        const a=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#22D3EE';
        const a2=getComputedStyle(document.documentElement).getPropertyValue('--accent-strong').trim()||'#06B6D4';
        bg.style.background=`radial-gradient(120% 90% at 50% 0%, ${a2} 0%, var(--bg) 78%)`;
        wv.style.setProperty('--wave-c1',a);wv.style.setProperty('--wave-c2',a2);
      }
    }
    function updateFull(){const s=data.stations[index];if(!s)return;const art=document.getElementById('fpArt');art.onerror=function(){this.onerror=null;this.src=PLACEHOLDER;};art.src=s.img||PLACEHOLDER;document.getElementById('fpBgImg').style.backgroundImage=`url('${(s.img||PLACEHOLDER).replace(/'/g,'')}')`;applyFpColor(s.img);document.getElementById('fpTitle').innerText=s.name;document.getElementById('fpSub').innerText=[s.city,cName(s.countryKey)].filter(Boolean).join(' · ')||'En vivo';document.getElementById('fpGenre').innerText=s.genre||'';renderSocials(s.socials);syncFav();syncIcons();}
    function openFull(){if(index===-1)return;updateFull();document.getElementById('fullPlayer').classList.add('open');}
    function closeFull(){document.getElementById('fullPlayer').classList.remove('open');}

    /* SHARE */
    function share(){const s=data.stations[index];if(!s)return;const url=location.origin+SHARE_ENDPOINT+slugify(s.name);const lugar=[s.city,s.country].filter(Boolean).join(', ');const text=`📻 Te invito a escuchar "${s.name}"${lugar?' desde '+lugar:''} en vivo por MultiRadios. ¡Dale play!`;if(navigator.share){navigator.share({title:s.name,text,url}).catch(()=>{});}else{window.open('https://wa.me/?text='+encodeURIComponent(text+' '+url),'_blank','noopener');}}

    /* VIEWS */
    function setView(v){currentView=v;document.querySelectorAll('[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===v));const t=document.getElementById('sectionTitle'),sub=document.getElementById('sectionSub');
      if(v==='favorites'){t.innerText='Tus favoritos';sub.innerText='Tus emisoras guardadas';}
      else if(v==='history'){t.innerText='Historial';sub.innerText='Lo último que escuchaste';}
      else if(v==='search'){t.innerText='Buscar';sub.innerText='Encuentra tu emisora';setTimeout(()=>document.getElementById('searchInput').focus(),100);}
      else if(v==='stations'){t.innerText=countryFilter?cName(countryFilter):'Todas las emisoras';sub.innerText='Radio en vivo · sin cortes';}
      else{t.innerText='Todas las emisoras';sub.innerText='Radio en vivo · sin cortes';}
      renderHero();loadGrid(document.getElementById('searchInput').value);document.getElementById('content').scrollTop=0;
    }

    /* SIDEBAR (mobile) */
    function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('scrim').classList.add('show');}
    function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('scrim').classList.remove('show');}

    /* DEEP LINK */
    function openShared(){const p=new URLSearchParams(location.search);const slug=p.get('station')||(location.hash.startsWith('#station=')?location.hash.slice(9):'');if(!slug)return;const i=data.stations.findIndex(s=>slugify(s.name)===slug);if(i===-1)return;play(i);openFull();}

    /* EVENTS */
    document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{setView(b.dataset.view);closeSidebar();});
    document.getElementById('searchInput').oninput=(e)=>loadGrid(e.target.value);
    document.getElementById('hamburger').addEventListener('click',openSidebar);
    document.getElementById('sideClose').addEventListener('click',closeSidebar);
    document.getElementById('scrim').addEventListener('click',closeSidebar);
    document.getElementById('fpClose').addEventListener('click',closeFull);
    document.getElementById('fpShare').addEventListener('click',share);
    document.getElementById('barShare').addEventListener('click',share);
    document.getElementById('barExpand').addEventListener('click',openFull);
    document.getElementById('barTrackInfo').addEventListener('click',e=>{if(e.target.closest('#barFav'))return;if(index!==-1)openFull();});
    document.getElementById('barFav').addEventListener('click',e=>{e.stopPropagation();const s=data.stations[index];if(s)toggleFav(s.name);});
    document.getElementById('fpFav').addEventListener('click',()=>{const s=data.stations[index];if(s)toggleFav(s.name);});
    document.getElementById('heroListen').addEventListener('click',()=>{const i=+document.getElementById('hero').dataset.i;if(!isNaN(i)){handlePlay(i);}});
    document.getElementById('heroFav').addEventListener('click',()=>{const i=+document.getElementById('hero').dataset.i;if(!isNaN(i)&&data.stations[i])toggleFav(data.stations[i].name);});
    const volEl=document.getElementById('vol'),fpVolEl=document.getElementById('fpVol');
    function setVol(v){audio.volume=v;volEl.value=v;fpVolEl.value=v;volEl.style.setProperty('--vol',(v*100)+'%');fpVolEl.style.setProperty('--vol',(v*100)+'%');}
    volEl.oninput=e=>setVol(parseFloat(e.target.value));fpVolEl.oninput=e=>setVol(parseFloat(e.target.value));
    window.addEventListener('storage',e=>{if(e.key===STORAGE_KEY)init();});

    /* PWA */
    let deferred=null;const installBtn=document.getElementById('pwaInstall'),topInstall=document.getElementById('topInstall');
    window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferred=e;installBtn.classList.add('show');topInstall.style.display='grid';});
    async function doInstall(){if(!deferred)return;deferred.prompt();await deferred.userChoice;deferred=null;installBtn.classList.remove('show');topInstall.style.display='none';}
    installBtn.addEventListener('click',doInstall);topInstall.addEventListener('click',doInstall);
    window.addEventListener('appinstalled',()=>{installBtn.classList.remove('show');topInstall.style.display='none';});

    if('serviceWorker'in navigator){
      let refreshing=false;
      if(navigator.serviceWorker.controller){navigator.serviceWorker.addEventListener('controllerchange',()=>{if(refreshing)return;refreshing=true;location.reload();});}
      window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').then(reg=>{try{reg.update();}catch(_){}reg.addEventListener('updatefound',()=>{const nw=reg.installing;if(nw)nw.addEventListener('statechange',()=>{if(nw.state==='installed'&&navigator.serviceWorker.controller){try{nw.postMessage('SKIP_WAITING');}catch(_){}}});});}).catch(()=>{});});
    }

    /* INIT */
    async function init(){
      try{
        data=norm(await loadData());
        applyTheme(data.theme);applySite(data.site);
        buildWave();renderCountries();loadGrid();renderHero();setVol(0.8);openShared();
      }catch(e){console.error(e);document.getElementById('radioGrid').innerHTML='<div class="empty-state"><i class="fas fa-triangle-exclamation"></i><p>Error al cargar la configuración.</p></div>';}
    }
    init();
  </script>
</body>
</html>
