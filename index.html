<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiRadios.es | Pro</title>

    <meta property="og:title" content="MultiRadios.es">
    <meta property="og:image" content="og-image.jpg">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-purple: #6200ea;
            --light-purple: #f3e5f5;
            --bg-body: #ffffff;
            --text-main: #311b92;
            --text-muted: #7e57c2;
            --border: #e1bee7;
            --shadow: 0 10px 30px rgba(98, 0, 234, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); padding-bottom: 120px; }
        
        header { padding: 20px 5%; text-align: center; }
        .logo { font-weight: 800; font-size: 1.8rem; text-transform: uppercase; color: var(--primary-purple); }
        .logo span { color: #fff; background: var(--primary-purple); padding: 2px 8px; border-radius: 6px; }

        .search-section { padding: 0 5% 20px; display: flex; justify-content: center; }
        .search-container { width: 100%; max-width: 500px; position: relative; }
        .search-container input { width: 100%; background: var(--light-purple); border: none; padding: 12px 15px 12px 45px; border-radius: 15px; color: var(--text-main); font-size: 0.9rem; }
        .search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--primary-purple); }

        /* GRID OPTIMIZADO PARA MÓVIL (3 COLUMNAS) */
        .content-section { padding: 0 3%; }
        .radio-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); 
            gap: 10px; 
        }

        .radio-card { 
            background: #fff; border-radius: 15px; padding: 8px; 
            transition: 0.3s; cursor: pointer; border: 1px solid var(--border); text-align: center; 
        }
        .radio-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
        .radio-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; margin-bottom: 5px; }
        .radio-card h4 { font-weight: 700; font-size: 0.75rem; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .radio-card p { display: none; } /* Ocultar género en grid móvil para ganar espacio */
        
        .radio-card.active { border: 2px solid var(--primary-purple); background: var(--light-purple); }

        /* PLAYER BAR */
        .player-bar { position: fixed; bottom: 0; width: 100%; height: 90px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center; padding: 0 15px; z-index: 9999; }
        .track-info { display: flex; align-items: center; gap: 10px; overflow: hidden; }
        .track-info img { width: 50px; height: 50px; border-radius: 8px; border: 1px solid var(--primary-purple); }
        .track-info b { font-size: 0.85rem; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .p-play { width: 45px; height: 45px; background: var(--primary-purple); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; }

        @media (max-width: 600px) {
            .radio-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; } /* 3 CUADROS POR FILA */
            .player-bar { grid-template-columns: 1.2fr 1fr; }
            .volume-controls { display: none; }
        }
    </style>
</head>
<body>
    <header><div class="logo">Multi<span>RADIOS</span></div></header>
    <section class="search-section"><div class="search-container"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Buscar..."></div></section>
    
    <main class="content-section"><div class="radio-grid" id="radioGrid"></div></main>

    <div class="player-bar">
        <div class="track-info">
            <img src="https://via.placeholder.com/50/6200ea/ffffff" id="pImg">
            <div><b id="pTitle">Selecciona...</b><span id="pGenre" style="font-size: 0.7rem; color: var(--text-muted);">En vivo</span></div>
        </div>
        <div style="display: flex; justify-content: center; gap: 15px; align-items: center;">
            <div class="p-play" id="pPlay" onclick="toggle()"><i class="fas fa-play"></i></div>
            <button onclick="next(1)" style="background:none; border:none; color:var(--primary-purple); font-size: 1.2rem;"><i class="fas fa-forward-step"></i></button>
        </div>
        <div class="volume-controls" style="display: flex; justify-content: flex-end; align-items: center; gap: 8px; color: var(--primary-purple);">
            <i class="fas fa-volume-high"></i><input type="range" id="vol" min="0" max="1" step="0.1" value="0.8">
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        let stations = []; let index = -1; const audio = document.getElementById('audio');
        async function fetchRadios() {
            try { const r = await fetch('radios.json'); stations = await r.json(); loadGrid(); } catch (e) { console.log(e); }
        }
        function loadGrid(q = "") {
            const grid = document.getElementById('radioGrid'); grid.innerHTML = "";
            stations.forEach((s, i) => {
                if(s.name.toLowerCase().includes(q.toLowerCase())) {
                    grid.innerHTML += `<div class="radio-card ${i===index?'active':''}" onclick="play(${i})"><img src="${s.img}"><h4>${s.name}</h4></div>`;
                }
            });
        }
        function play(i) {
            index = i; const s = stations[index]; audio.src = s.url; audio.play();
            document.getElementById('pImg').src = s.img; document.getElementById('pTitle').innerText = s.name;
            document.getElementById('pPlay').innerHTML = '<i class="fas fa-pause"></i>';
            loadGrid(document.getElementById('searchInput').value);
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({ title: s.name, artist: "MultiRadios.es", artwork: [{src: s.img, sizes: '512x512'}] });
            }
        }
        function toggle() { if(index===-1) return; audio.paused?(audio.play(),document.getElementById('pPlay').innerHTML='<i class="fas fa-pause"></i>'):(audio.pause(),document.getElementById('pPlay').innerHTML='<i class="fas fa-play"></i>'); }
        function next(d) { index = (index+d+stations.length)%stations.length; play(index); }
        document.getElementById('searchInput').oninput = (e) => loadGrid(e.target.value);
        document.getElementById('vol').oninput = (e) => audio.volume = e.target.value;
        fetchRadios();
    </script>
</body>
</html>
