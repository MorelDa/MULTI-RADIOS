<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link id="fontLink" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- HLS.js: soporte de streams .m3u8 -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>

  <style>
    :root {
      --primary: #8B5CF6;
      --primary-strong: #7C3AED;
      --accent: #A78BFA;
      --bg: #0B0A0F;
      --sidebar: #0E0D13;
      --surface: #16151E;
      --surface-2: #1C1B26;
      --elev: #232130;
      --text: #F4F3FA;
      --muted: #A9A6B8;
      --border: rgba(255,255,255,0.07);
      --player-bg: #100F16;
      --font: 'Sora', sans-serif;
      --font-body: 'Manrope', sans-serif;
      --radius: 14px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2833; border-radius: 20px; border: 2px solid var(--bg); }
    ::-webkit-scrollbar-thumb:hover { background: #3a3746; }
    ::selection { background: var(--primary); color: #fff; }
    a { color: inherit; text-decoration: none; }
    h1,h2,h3,h4 { font-family: var(--font); }

    /* ---------- APP SHELL ---------- */
    .app {
      display: grid;
      grid-template-columns: 248px 1fr;
      grid-template-rows: 1fr;
      height: 100vh;
      height: 100dvh;
      padding-bottom: 96px; /* player bar */
      gap: 8px;
      padding: 8px 8px calc(96px + 8px);
    }

    /* ---------- SIDEBAR ---------- */
    .sidebar {
      background: var(--sidebar);
      border-radius: 18px;
      display: flex; flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .brand {
      display: flex; align-items: center; gap: 12px;
      padding: 22px 20px 18px;
    }
    .brand .mark {
      width: 40px; height: 40px; border-radius: 11px; flex-shrink: 0;
      background: linear-gradient(145deg, var(--primary), var(--primary-strong));
      display: grid; place-items: center; color: #fff; font-size: 1.15rem;
      box-shadow: 0 6px 18px rgba(124,58,237,.45);
    }
    .brand .logo { font-family: var(--font); font-weight: 800; font-size: 1.15rem; letter-spacing: -.5px; line-height: 1; }
    .brand .logo span { color: var(--accent); }
    .brand .logo-img { height: 34px; max-width: 150px; object-fit: contain; display: none; }

    .nav { padding: 6px 12px; display: flex; flex-direction: column; gap: 3px; }
    .nav-item {
      display: flex; align-items: center; gap: 15px;
      padding: 12px 14px; border-radius: 11px; cursor: pointer;
      color: var(--muted); font-weight: 600; font-size: .95rem;
      transition: background .18s, color .18s;
      border: none; background: none; text-align: left; width: 100%;
    }
    .nav-item i { font-size: 1.15rem; width: 22px; text-align: center; }
    .nav-item:hover { color: var(--text); background: rgba(255,255,255,.04); }
    .nav-item.active { color: #fff; background: rgba(139,92,246,.16); }
    .nav-item.active i { color: var(--accent); }

    .side-scroll { flex: 1; overflow-y: auto; padding: 8px 12px 12px; }
    .side-label {
      font-size: .72rem; text-transform: uppercase; letter-spacing: .12em;
      color: var(--muted); font-weight: 700; padding: 14px 14px 8px; opacity: .7;
    }
    .country-list { display: flex; flex-direction: column; gap: 2px; }
    .country-btn {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 14px; border-radius: 9px; cursor: pointer;
      background: none; border: none; color: var(--muted);
      font-family: var(--font-body); font-weight: 600; font-size: .88rem; width: 100%; text-align: left;
      transition: background .15s, color .15s;
    }
    .country-btn:hover { color: var(--text); background: rgba(255,255,255,.04); }
    .country-btn.active { color: var(--accent); background: rgba(139,92,246,.12); }
    .country-btn .cnt { font-size: .74rem; background: rgba(255,255,255,.07); padding: 1px 8px; border-radius: 20px; font-weight: 700; }

    .side-foot { padding: 12px; border-top: 1px solid var(--border); }
    .side-foot .side-btn {
      width: 100%; display: flex; align-items: center; gap: 12px; justify-content: center;
      padding: 11px; border-radius: 11px; border: 1px solid var(--border);
      background: rgba(255,255,255,.03); color: var(--text); cursor: pointer;
      font-family: var(--font-body); font-weight: 600; font-size: .85rem; margin-bottom: 8px;
      transition: background .18s, transform .1s;
    }
    .side-foot .side-btn:hover { background: rgba(255,255,255,.07); }
    .side-foot .side-btn:active { transform: scale(.98); }
    .side-foot .side-btn.install { display: none; background: linear-gradient(145deg,var(--primary),var(--primary-strong)); border: none; box-shadow: 0 6px 16px rgba(124,58,237,.4); }
    .side-foot .side-btn.install.show { display: flex; }

    /* ---------- MAIN ---------- */
    .main {
      background: linear-gradient(180deg, #14121c 0%, var(--surface) 220px, var(--surface) 100%);
      border-radius: 18px; overflow: hidden;
      display: flex; flex-direction: column; position: relative;
      border: 1px solid var(--border);
    }
    .topbar {
      position: sticky; top: 0; z-index: 20;
      display: flex; align-items: center; gap: 16px;
      padding: 16px 26px;
      background: rgba(14,13,19,.55); backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .topbar .mobile-brand { display: none; align-items: center; gap: 10px; }
    .topbar .mobile-brand .mark { width: 34px; height: 34px; border-radius: 9px; background: linear-gradient(145deg,var(--primary),var(--primary-strong)); display: grid; place-items: center; color:#fff; }
    .search-box {
      flex: 1; max-width: 460px; position: relative;
    }
    .search-box input {
      width: 100%; background: var(--surface-2); border: 1px solid var(--border);
      padding: 13px 16px 13px 46px; border-radius: 30px; color: var(--text);
      font-family: var(--font-body); font-size: .95rem; transition: border-color .2s, background .2s;
    }
    .search-box input::placeholder { color: var(--muted); }
    .search-box input:focus { outline: none; border-color: var(--primary); background: #211f2c; }
    .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--muted); }
    .topbar-spacer { flex: 1; }
    .icon-btn {
      width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--border);
      background: var(--surface-2); color: var(--text); cursor: pointer; display: grid; place-items: center;
      font-size: 1rem; transition: background .18s, transform .1s;
    }
    .icon-btn:hover { background: var(--elev); }
    .icon-btn:active { transform: scale(.94); }

    .content { flex: 1; overflow-y: auto; padding: 8px 26px 30px; }

    /* banners */
    .banner-container {
      width: 100%; height: 190px; border-radius: 16px; overflow: hidden;
      position: relative; margin: 8px 0 26px; display: none;
      box-shadow: 0 12px 34px rgba(0,0,0,.4);
    }
    .banner-slide { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity .8s ease; cursor: pointer; }
    .banner-slide.active { opacity: 1; z-index: 1; }
    .banner-dots { position: absolute; bottom: 12px; left: 0; right: 0; z-index: 3; display: flex; justify-content: center; gap: 7px; }
    .banner-dots span { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,.4); transition: all .3s; }
    .banner-dots span.on { background: #fff; width: 22px; border-radius: 6px; }

    .section-head { display: flex; align-items: flex-end; justify-content: space-between; margin: 22px 0 16px; }
    .section-head h2 { font-size: 1.5rem; font-weight: 800; letter-spacing: -.6px; }
    .section-head .sub { color: var(--muted); font-size: .85rem; margin-top: 3px; }

    .chips { display: flex; gap: 9px; flex-wrap: wrap; margin-bottom: 22px; }
    .chip {
      padding: 8px 16px; border-radius: 30px; background: var(--surface-2); border: 1px solid var(--border);
      color: var(--muted); cursor: pointer; font-weight: 600; font-size: .84rem; transition: all .18s;
      font-family: var(--font-body);
    }
    .chip:hover { color: var(--text); }
    .chip.active { background: #fff; color: #0B0A0F; border-color: #fff; }

    /* grid */
    .radio-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(168px, 1fr)); gap: 16px;
    }
    .radio-card {
      background: var(--surface-2); border-radius: var(--radius); padding: 14px;
      cursor: pointer; transition: background .2s, transform .15s; position: relative;
      border: 1px solid transparent;
    }
    .radio-card:hover { background: var(--elev); }
    .radio-card.active { border-color: var(--primary); background: rgba(139,92,246,.1); }
    .card-art {
      width: 100%; aspect-ratio: 1/1; border-radius: 10px; overflow: hidden;
      background: linear-gradient(160deg,#1a1922,#0f0e15); position: relative; margin-bottom: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,.35);
    }
    .card-art img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }
    .card-country {
      position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,.6);
      backdrop-filter: blur(6px); color: #fff; font-size: .64rem; font-weight: 700;
      padding: 3px 8px; border-radius: 20px; letter-spacing: .04em;
    }
    .card-fav {
      position: absolute; top: 6px; right: 6px; width: 32px; height: 32px; border-radius: 50%;
      border: none; background: rgba(0,0,0,.5); backdrop-filter: blur(6px); color: #fff;
      display: grid; place-items: center; cursor: pointer; opacity: 0; transform: scale(.8);
      transition: opacity .18s, transform .18s, color .18s; font-size: .82rem; z-index: 2;
    }
    .radio-card:hover .card-fav { opacity: 1; transform: scale(1); }
    .card-fav.on { opacity: 1; transform: scale(1); color: #ff5da2; }
    .card-fav:hover { background: rgba(0,0,0,.75); }
    .card-play {
      position: absolute; bottom: 8px; right: 8px; width: 46px; height: 46px; border-radius: 50%;
      background: var(--primary); color: #fff; display: grid; place-items: center; font-size: 1rem;
      box-shadow: 0 8px 18px rgba(124,58,237,.5); opacity: 0; transform: translateY(8px);
      transition: opacity .22s, transform .22s, background .18s; z-index: 2; border: none; cursor: pointer;
    }
    .radio-card:hover .card-play { opacity: 1; transform: translateY(0); }
    .card-play:hover { background: var(--accent); }
    .radio-card.active .card-play { opacity: 1; transform: translateY(0); }
    .card-title { font-size: .92rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: var(--font); }
    .card-meta { font-size: .78rem; color: var(--muted); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .equalizer { position: absolute; bottom: 8px; left: 8px; display: none; gap: 2px; align-items: flex-end; height: 16px; z-index: 2; }
    .radio-card.playing .equalizer { display: flex; }
    .equalizer span { width: 3px; background: var(--accent); border-radius: 2px; animation: eq .9s ease-in-out infinite; }
    .equalizer span:nth-child(1){ animation-delay: 0s; height: 6px; }
    .equalizer span:nth-child(2){ animation-delay: .2s; height: 14px; }
    .equalizer span:nth-child(3){ animation-delay: .4s; height: 9px; }
    .equalizer span:nth-child(4){ animation-delay: .1s; height: 12px; }
    @keyframes eq { 0%,100%{ transform: scaleY(.4); } 50%{ transform: scaleY(1); } }

    .empty-state { text-align: center; padding: 70px 20px; color: var(--muted); grid-column: 1/-1; }
    .empty-state i { font-size: 2.6rem; margin-bottom: 14px; color: var(--elev); display: block; }

    /* ---------- PLAYER BAR ---------- */
    .player-bar {
      position: fixed; bottom: 8px; left: 8px; right: 8px; height: 88px;
      background: var(--player-bg); border: 1px solid var(--border);
      border-radius: 18px; z-index: 500;
      display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
      padding: 0 22px; box-shadow: 0 -4px 30px rgba(0,0,0,.4);
      gap: 16px;
    }
    .track-info { display: flex; align-items: center; gap: 14px; min-width: 0; cursor: pointer; }
    .track-info .art { width: 58px; height: 58px; border-radius: 10px; object-fit: contain; padding: 4px; flex-shrink: 0; background: linear-gradient(160deg,#1a1922,#0f0e15); box-shadow: 0 4px 12px rgba(0,0,0,.4); transform-origin: center; }
    .track-info .art.beating { animation: barBeat 1.6s ease-in-out infinite; }
    @keyframes barBeat { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.08); } }
    .track-info .txt { min-width: 0; }
    .track-info b { display: block; font-size: .95rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: var(--font); }
    .track-info span { font-size: .78rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    .track-info .fav-mini { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.05rem; padding: 6px; flex-shrink: 0; transition: color .18s, transform .1s; }
    .track-info .fav-mini.on { color: #ff5da2; }
    .track-info .fav-mini:active { transform: scale(.85); }

    .controls { display: flex; align-items: center; gap: 20px; }
    .btn-nav { background: none; border: none; color: var(--muted); font-size: 1.15rem; cursor: pointer; transition: color .18s, transform .1s; }
    .btn-nav:hover { color: var(--text); }
    .btn-nav:active { transform: scale(.9); }
    .p-play {
      width: 52px; height: 52px; border-radius: 50%; background: #fff; color: #0B0A0F;
      display: grid; place-items: center; font-size: 1.15rem; cursor: pointer; border: none;
      transition: transform .12s, box-shadow .18s;
    }
    .p-play:hover { transform: scale(1.06); box-shadow: 0 6px 20px rgba(255,255,255,.2); }
    .p-play:active { transform: scale(.97); }

    .player-right { display: flex; align-items: center; justify-content: flex-end; gap: 14px; }
    .player-right .icon-btn { width: 38px; height: 38px; background: transparent; border-color: transparent; color: var(--muted); }
    .player-right .icon-btn:hover { color: var(--text); background: rgba(255,255,255,.06); }
    .vol-cont { display: flex; align-items: center; gap: 8px; }
    .vol-cont i { color: var(--muted); font-size: .9rem; }
    input[type=range].vol {
      -webkit-appearance: none; appearance: none; width: 100px; height: 5px; border-radius: 10px;
      background: linear-gradient(90deg, var(--accent) var(--vol,70%), #35333f var(--vol,70%));
      cursor: pointer;
    }
    input[type=range].vol::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.4); }
    input[type=range].vol::-moz-range-thumb { width: 13px; height: 13px; border: none; border-radius: 50%; background: #fff; }

    .live-badge { display: inline-flex; align-items: center; gap: 5px; font-size: .68rem; font-weight: 700; color: #ff5c7a; letter-spacing: .06em; }
    .live-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: #ff5c7a; animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:.3; } }

    /* ---------- MOBILE NAV ---------- */
    .mobile-nav { display: none; }

    /* ---------- FULL PLAYER ---------- */
    .full-player {
      position: fixed; inset: 0; z-index: 900; display: flex; flex-direction: column;
      background: var(--bg); transform: translateY(100%); transition: transform .4s cubic-bezier(.4,0,.2,1);
      overflow: hidden;
    }
    .full-player.open { transform: translateY(0); }
    .fp-bg { position: absolute; inset: 0; z-index: 0; transition: background .5s ease; }
    .fp-bg-img { position: absolute; inset: 0; background-size: cover; background-position: center; filter: blur(70px) saturate(1.5) brightness(.65); transform: scale(1.4); opacity: .45; z-index: 0; transition: background-image .4s; }
    .fp-bg::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(11,10,15,.25), rgba(11,10,15,.55) 55%, rgba(11,10,15,.94)); }
    .fp-inner { position: relative; z-index: 2; flex: 1; display: flex; flex-direction: column; padding: 22px 24px calc(30px + env(safe-area-inset-bottom)); max-width: 560px; width: 100%; margin: 0 auto; }
    .fp-top { display: flex; align-items: center; justify-content: space-between; }
    .fp-top .lbl { font-size: .72rem; text-transform: uppercase; letter-spacing: .16em; color: var(--muted); font-weight: 700; }
    .fp-close { width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--border); background: rgba(255,255,255,.06); color: #fff; cursor: pointer; font-size: 1.1rem; }
    .fp-art-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 26px 0; min-height: 0; perspective: 1100px; }
    .fp-art { width: min(74vw, 330px); max-height: 40vh; aspect-ratio: 1/1; border-radius: 22px; object-fit: contain; padding: 10px; box-shadow: 0 30px 70px rgba(0,0,0,.55); background: rgba(255,255,255,.04); transform-origin: center center; will-change: transform; }
    .fp-art.beating { animation: fpDance 2.4s ease-in-out infinite; }
    @keyframes fpDance {
      0%   { transform: translateY(0) rotateY(0deg) rotateZ(0deg) scale(1); }
      15%  { transform: translateY(-10px) rotateY(14deg) rotateZ(1.5deg) scale(1.035); }
      30%  { transform: translateY(0) rotateY(0deg) rotateZ(0deg) scale(1); }
      45%  { transform: translateY(-6px) rotateY(-14deg) rotateZ(-1.5deg) scale(1.02); }
      60%  { transform: translateY(0) rotateY(0deg) rotateZ(0deg) scale(1); }
      75%  { transform: translateY(-4px) rotateY(6deg) scale(1.015); }
      100% { transform: translateY(0) rotateY(0deg) scale(1); }
    }
    .fp-meta { text-align: left; }
    .fp-meta h1 { font-size: 1.7rem; font-weight: 800; letter-spacing: -.6px; line-height: 1.1; margin-bottom: 8px; }
    .fp-meta p { color: var(--muted); font-size: .95rem; font-weight: 500; }
    .fp-genre { color: var(--accent); font-size: .85rem; margin-top: 6px; font-weight: 600; }
    .fp-socials { display: flex; gap: 10px; margin: 18px 0; flex-wrap: wrap; }
    .fp-socials a { width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,.08); display: grid; place-items: center; color: #fff; font-size: 1rem; transition: background .18s, transform .1s; }
    .fp-socials a:hover { background: var(--primary); transform: translateY(-2px); }
    .fp-controls { display: flex; align-items: center; justify-content: center; gap: 30px; margin-top: 8px; }
    .fp-controls .btn-nav { font-size: 1.5rem; color: #fff; }
    .fp-play { width: 68px; height: 68px; border-radius: 50%; background: #fff; color: #0B0A0F; border: none; font-size: 1.5rem; cursor: pointer; display: grid; place-items: center; transition: transform .12s; }
    .fp-play:hover { transform: scale(1.05); }
    .fp-actions { display: flex; align-items: center; justify-content: space-between; margin-top: 26px; gap: 14px; }
    .fp-actions .a-btn { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,.06); border: 1px solid var(--border); color: #fff; padding: 10px 18px; border-radius: 30px; cursor: pointer; font-family: var(--font-body); font-weight: 600; font-size: .85rem; transition: background .18s; }
    .fp-actions .a-btn:hover { background: rgba(255,255,255,.12); }
    .fp-actions .a-btn.on { color: #ff5da2; }
    .fp-vol { flex: 1; display: flex; align-items: center; gap: 10px; max-width: 200px; }

    /* ---------- MODAL / TOAST ---------- */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(6px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
    .overlay.show { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 30px; width: 100%; max-width: 360px; text-align: center; }
    .modal h3 { font-size: 1.3rem; margin-bottom: 6px; }
    .modal p { color: var(--muted); font-size: .88rem; margin-bottom: 20px; }
    .modal input { width: 100%; background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: #fff; font-size: 1.3rem; text-align: center; letter-spacing: .5em; font-family: var(--font); }
    .modal input:focus { outline: none; border-color: var(--primary); }
    .modal .err { color: #ff6b6b; font-size: .8rem; min-height: 18px; margin-top: 8px; }
    .modal-btns { display: flex; gap: 10px; margin-top: 16px; }
    .modal-btns button { flex: 1; padding: 13px; border-radius: 12px; border: none; cursor: pointer; font-family: var(--font-body); font-weight: 700; font-size: .9rem; }
    .btn-cancel { background: var(--surface-2); color: var(--text); }
    .btn-ok { background: var(--primary); color: #fff; }

    .notif-toast {
      position: fixed; left: 50%; transform: translateX(-50%) translateY(140%); bottom: 108px;
      width: min(92vw, 440px); background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 14px 16px; z-index: 2000; display: flex; gap: 13px; align-items: flex-start;
      box-shadow: 0 16px 40px rgba(0,0,0,.5); transition: transform .45s cubic-bezier(.4,0,.2,1);
    }
    .notif-toast.show { transform: translateX(-50%) translateY(0); }
    .notif-toast .n-ico { width: 44px; height: 44px; border-radius: 11px; background: linear-gradient(145deg,var(--primary),var(--primary-strong)); display: grid; place-items: center; color: #fff; font-size: 1.2rem; flex-shrink: 0; object-fit: cover; }
    .notif-toast .n-body { flex: 1; min-width: 0; }
    .notif-toast .n-body b { font-size: .95rem; display: block; margin-bottom: 3px; }
    .notif-toast .n-body p { font-size: .82rem; color: var(--muted); line-height: 1.4; }
    .notif-toast .n-body a { color: var(--accent); font-size: .82rem; font-weight: 700; display: inline-block; margin-top: 6px; }
    .notif-toast .n-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; }

    /* Llave discreta de acceso al panel */
    .admin-key {
      position: fixed; top: 10px; left: 10px; z-index: 1200;
      width: 30px; height: 30px; border: none; cursor: pointer;
      background: transparent; color: var(--muted);
      opacity: 0.14; transition: opacity .25s, transform .25s;
      display: flex; align-items: center; justify-content: center; font-size: .9rem; padding: 0;
    }
    .admin-key:hover { opacity: .9; transform: rotate(-15deg); }

    /* Botón flotante de WhatsApp */
    .wa-fab {
      position: fixed; right: 18px; bottom: 118px; z-index: 600;
      display: inline-flex; align-items: center; gap: 0; height: 54px; padding: 0;
      border-radius: 30px; background: #25D366; color: #fff; text-decoration: none;
      box-shadow: 0 6px 20px rgba(37,211,102,.5); overflow: hidden;
      transition: padding .3s ease, box-shadow .2s ease, transform .12s;
    }
    .wa-fab i { font-size: 1.7rem; width: 54px; min-width: 54px; height: 54px; display: flex; align-items: center; justify-content: center; }
    .wa-fab-label { max-width: 0; opacity: 0; white-space: nowrap; font-weight: 700; font-size: .85rem; transition: max-width .35s ease, opacity .25s ease, padding .35s ease; padding: 0; }
    .wa-fab:hover { padding-right: 18px; box-shadow: 0 10px 26px rgba(37,211,102,.65); }
    .wa-fab:hover .wa-fab-label { max-width: 170px; opacity: 1; padding-right: 4px; }
    .wa-fab:active { transform: scale(.95); }

    /* ---------- RESPONSIVE ---------- */
    .fa-spin { animation: fa-spin 0.8s linear infinite; }
    @keyframes fa-spin { 100% { transform: rotate(360deg); } }
    .stream-toast {
      position: fixed; left: 50%; transform: translateX(-50%) translateY(160%); bottom: 108px;
      background: #2a1420; border: 1px solid #ff5c7a55; color: #ffb3c4; z-index: 850;
      padding: 12px 18px; border-radius: 14px; font-size: .85rem; font-weight: 600;
      display: flex; align-items: center; gap: 10px; box-shadow: 0 12px 30px rgba(0,0,0,.5);
      transition: transform .4s cubic-bezier(.4,0,.2,1); max-width: 90vw;
    }
    .stream-toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 900px) {
      body { overflow-x: hidden; }
      .app { grid-template-columns: 1fr; padding: 0 0 calc(132px + env(safe-area-inset-bottom)); gap: 0; height: auto; min-height: 100dvh; }
      .sidebar { display: none !important; }
      .main { border-radius: 0; border: none; min-height: 100dvh; background: var(--bg); }
      .topbar { padding: 12px 14px; gap: 10px; }
      .topbar .mobile-brand { display: flex; }
      .search-box { max-width: none; }
      .search-box input { padding: 11px 14px 11px 42px; font-size: .9rem; }
      .content { padding: 4px 14px 20px; }
      .banner-container { height: 140px; margin: 6px 0 18px; }
      .section-head { margin: 14px 0 12px; }
      .section-head h2 { font-size: 1.2rem; }

      /* Chips de país (scroll horizontal) */
      #mobileChips { display: flex !important; flex-wrap: nowrap; overflow-x: auto; gap: 8px; padding-bottom: 8px; margin-bottom: 16px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
      #mobileChips::-webkit-scrollbar { display: none; }
      .chip { flex: 0 0 auto; padding: 7px 14px; font-size: .8rem; }

      /* Grid: columnas fijas sin desbordes */
      .radio-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
      .radio-card { padding: 8px; }
      .card-title { font-size: .8rem; }
      .card-meta { font-size: .7rem; }
      .card-fav { opacity: 1; transform: scale(1); width: 28px; height: 28px; font-size: .72rem; }
      .card-play { opacity: 1; transform: none; width: 36px; height: 36px; font-size: .82rem; }
      .card-country { font-size: .58rem; padding: 2px 6px; }

      /* Player mini encima del nav inferior */
      .player-bar {
        left: 0; right: 0; bottom: 58px; border-radius: 16px 16px 0 0;
        grid-template-columns: 1fr auto; height: 64px; padding: 0 12px; gap: 10px;
        border-left: none; border-right: none;
      }
      .player-bar .player-right { display: none; }
      .track-info .art { width: 44px; height: 44px; }
      .track-info b { font-size: .85rem; }
      .track-info .fav-mini { display: none; }
      .controls { gap: 12px; }
      .controls .btn-nav.prev { display: none; }
      .controls .btn-nav.next { font-size: 1rem; }
      .p-play { width: 42px; height: 42px; font-size: .95rem; }

      .mobile-nav {
        display: grid; grid-template-columns: repeat(3, 1fr);
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 560; height: 58px;
        background: rgba(12,11,17,.94); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom);
      }
      .mnav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; background: none; border: none; color: var(--muted); cursor: pointer; font-family: var(--font-body); font-size: .66rem; font-weight: 600; }
      .mnav-item i { font-size: 1.18rem; }
      .mnav-item.active { color: var(--accent); }

      .wa-fab { right: 14px; bottom: 132px; height: 48px; }
      .wa-fab i { width: 48px; min-width: 48px; height: 48px; font-size: 1.5rem; }
      .admin-key { top: 12px; left: auto; right: 12px; opacity: .18; }
      .notif-toast { bottom: 132px; }
      .stream-toast { bottom: 132px; }
      .fp-meta h1 { font-size: 1.35rem; }
      .fp-actions { flex-wrap: wrap; }
      .fp-vol { order: 3; max-width: none; flex-basis: 100%; margin-top: 10px; }
    }
    @media (max-width: 380px) {
      .radio-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>

  <!-- PLAYER BAR -->

  <!-- MOBILE NAV -->
  <nav class="mobile-nav">

    <button class="mnav-item" data-view="search" data-testid="mnav-search"><i class="fas fa-magnifying-glass"></i> Buscar</button>

  <!-- FULL PLAYER -->

  <!-- PASSWORD MODAL -->

  <!-- NOTIFICATION -->
  <div class="notif-toast" id="notifToast">
    <div class="n-ico" id="notifIco"><i class="fas fa-bell"></i></div>
    <div class="n-body">

    <i class="fab fa-whatsapp"></i>
    <span class="wa-fab-label" id="waFabLabel">Agrega tu radio</span>
  </a>
  <div class="stream-toast" id="streamToast"><i class="fas fa-triangle-exclamation"></i><span id="streamToastMsg"></span></div>

  <script>
    const STORAGE_KEY = 'multiradios_data_v1';
    const ADMIN_PASS  = 'kevin6';
    const AUTH_KEY    = 'mr_admin_ok';
    const NOTIF_SEEN_KEY = 'mr_notif_seen';
    const FAVS_KEY    = 'mr_favs';

    /* PROXY CONFIG - Solución CORS opcional. Deja vacío para reproducir en directo. */
    const PROXY_BASE = '';
    const SHARE_ENDPOINT = '/api/share/';
    const PLACEHOLDER = 'icon-192.png';

    let data = { site: {}, theme: {}, banners: [], stations: [], notification: null };
    let view = { list: [] };          // lista visible actual
    let index = -1;                    // índice dentro de data.stations
    let currentView = 'home';
    let countryFilter = '';
    let userPaused = false;
    let connecting = false;
    let connectTimer = null;
    let notifDismissed = false;
    let carouselTimer = null;
    let favs = loadFavs();
    const audio = document.getElementById('audio');

    const SOCIAL_ICONS = {
      facebook:'fab fa-facebook-f', instagram:'fab fa-instagram', twitter:'fab fa-x-twitter',
      youtube:'fab fa-youtube', tiktok:'fab fa-tiktok', whatsapp:'fab fa-whatsapp',
      telegram:'fab fa-telegram', spotify:'fab fa-spotify', website:'fas fa-globe'
    };

    function slugify(str){
      return String(str||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'')
        .toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'') || 'radio';
    }
    function escapeHtml(str){
      return String(str==null?'':str).replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function loadFavs(){ try { return JSON.parse(localStorage.getItem(FAVS_KEY)||'[]'); } catch(_){ return []; } }
    function saveFavs(){ try { localStorage.setItem(FAVS_KEY, JSON.stringify(favs)); } catch(_){} }
    function isFav(name){ return favs.includes(slugify(name)); }
    function toggleFav(name){
      const s = slugify(name); const i = favs.indexOf(s);
      if (i === -1) favs.push(s); else favs.splice(i,1);
      saveFavs();
      loadGrid(document.getElementById('searchInput').value);
      syncFavButtons();
    }

    /* ---------- THEME / IDENTITY ---------- */
    function applyTheme(t={}){
      const root = document.documentElement;
      if (t.primary) root.style.setProperty('--primary', t.primary);
      if (t.accent) root.style.setProperty('--accent', t.accent);
      if (t.primary){ const meta=document.getElementById('metaThemeColor'); if(meta) meta.setAttribute('content', t.background||'#0B0A0F'); }
      if (t.accent) root.style.setProperty('--primary-strong', t.primary || '#7C3AED');
      if (t.background) root.style.setProperty('--bg', t.background);
      if (t.surface) root.style.setProperty('--surface', t.surface);
      if (t.light) root.style.setProperty('--surface-2', t.light);
      if (t.textDark) root.style.setProperty('--text', t.textDark);
      if (t.textMuted) root.style.setProperty('--muted', t.textMuted);
      if (t.border) root.style.setProperty('--border', t.border);
      if (t.playerBg) root.style.setProperty('--player-bg', t.playerBg);
      if (t.font){
        const fam = t.font.replace(/ /g,'+');
        document.getElementById('fontLink').href =
          `https://fonts.googleapis.com/css2?family=${fam}:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap`;
        root.style.setProperty('--font', `'${t.font}', sans-serif`);
      }
    }
    function applySite(s={}){
      if (s.title) document.title = s.title + ' | Spotube Edition';
      if (s.favicon) document.getElementById('faviconLink').href = s.favicon;
      const logoImg=document.getElementById('logoImg'), logoText=document.getElementById('logoText');
      if (s.logoImage){ logoImg.src=s.logoImage; logoImg.style.display='block'; logoText.style.display='none'; }
      else { logoImg.style.display='none'; logoText.style.display='block'; logoText.innerHTML=`${s.logoText||'Multi'}<span>${s.logoAccent||'RADIOS'}</span>`; }
      // Botón flotante WhatsApp (configurable en el admin)
      const wa=document.getElementById('waFab');
      const num=String(s.whatsapp==null?'34604875068':s.whatsapp).replace(/[^0-9]/g,'');
      const msg=s.whatsappText||'¡Hola! Quiero agregar mi radio a MultiRadios 📻';
      if(num){ wa.href='https://wa.me/'+num+'?text='+encodeURIComponent(msg); wa.style.display='inline-flex'; document.getElementById('waFabLabel').innerText=s.whatsappLabel||'Agrega tu radio'; }
      else { wa.style.display='none'; }
    }

    /* ---------- DATA ---------- */
    async function loadData(){
      try { const r=await fetch('radios.json?v='+Date.now(),{cache:'no-store'}); if(r.ok) return normalizeData(await r.json()); }
      catch(e){ console.warn('fetch radios.json fail', e); }
      try { const c=localStorage.getItem(STORAGE_KEY); if(c){ const p=JSON.parse(c); if(p&&(p.stations||p.banners)) return normalizeData(p); } }
      catch(e){}
      return normalizeData({});
    }
    function normalizeData(d){
      const out = {
        site: d.site||{}, theme: d.theme||{}, banners: Array.isArray(d.banners)?d.banners:[],
        stations: Array.isArray(d.stations)?d.stations:[], notification: d.notification||null
      };
      out.stations = out.stations.filter(s=>s&&s.name&&s.url).map(s=>({
        name:String(s.name).trim(), url:String(s.url).trim(), img:s.img||PLACEHOLDER,
        genre:s.genre||'', country:(s.country||'').trim(), city:(s.city||'').trim(),
        countryKey: canonicalCountry(s.country),
        proxy:!!s.proxy, socials:s.socials||{}
      }));
      return out;
    }
    function canonicalCountry(c){
      const k=String(c||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
      if(!k) return 'OTHER';
      if(/^(py|par|paraguay)/.test(k)) return 'PY';
      if(/^(ar|arg|argentina)/.test(k)) return 'AR';
      if(/^(es|esp|espana|spain)/.test(k)) return 'ES';
      if(/^(fr|fra|francia|france)/.test(k)) return 'FR';
      if(/^(us|usa|eeuu|estados)/.test(k)) return 'US';
      if(/^(uy|uru|uruguay)/.test(k)) return 'UY';
      if(/^(br|bra|brasil|brazil)/.test(k)) return 'BR';
      if(/^(mx|mex|mexico)/.test(k)) return 'MX';
      if(/^(co|col|colombia)/.test(k)) return 'CO';
      if(/^(cl|chi|chile)/.test(k)) return 'CL';
      if(/^(pe|per|peru)/.test(k)) return 'PE';
      return String(c).trim().toUpperCase().slice(0,3);
    }

    /* ---------- COUNTRY SIDEBAR ---------- */
    function countryName(code){
      const map={ PY:'Paraguay', AR:'Argentina', ES:'España', FR:'Francia', US:'EE.UU.', UY:'Uruguay', BR:'Brasil', MX:'México', CO:'Colombia', CL:'Chile', PE:'Perú', OTHER:'Otros' };
      const k=String(code||'').trim().toUpperCase();
      return map[k] || (code? String(code).trim() : 'Otros');
    }
    function renderCountries(){
      const counts={};

    /* ---------- HLS / AUDIO ---------- */
    let hlsInstance=null, hlsRetries=0;
    function destroyHls(){ if(hlsInstance){ try{hlsInstance.destroy();}catch(_){} hlsInstance=null; } }
    function isHlsUrl(u){ try{ const c=String(u).split('?')[0].toLowerCase(); return c.endsWith('.m3u8')||c.includes('.m3u8'); }catch(_){ return false; } }
    function nativeHlsSupported(){ return audio.canPlayType('application/vnd.apple.mpegurl')!=='' || audio.canPlayType('application/x-mpegURL')!==''; }

    function buildStreamUrl(station, forceProxy){
      let src=station.url;
      if((station.proxy||forceProxy) && PROXY_BASE) src=PROXY_BASE.replace(/\/$/,'')+'/stream?url='+encodeURIComponent(src);
      if(!isHlsUrl(src)){ const sep=src.includes('?')?'&':'?'; src=src+sep+'_cb='+Date.now(); }
      return src;
    }
    function stopStream(){ setConnecting(false); destroyHls(); try{audio.pause();}catch(_){} audio.removeAttribute('src'); audio.src=''; try{audio.load();}catch(_){} }

    function playViaHls(url, station){
      hlsInstance=new Hls({
        enableWorker:true, lowLatencyMode:false, backBufferLength:30, maxBufferLength:30,
        maxMaxBufferLength:60, liveSyncDurationCount:3,
        manifestLoadingTimeOut:20000, manifestLoadingMaxRetry:6, manifestLoadingRetryDelay:1000,
        levelLoadingTimeOut:20000, levelLoadingMaxRetry:6,
        fragLoadingTimeOut:30000, fragLoadingMaxRetry:8, fragLoadingRetryDelay:1000
      });
      hlsInstance.loadSource(url);
      hlsInstance.attachMedia(audio);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, ()=>{ hlsRetries=0; audio.play().catch(()=>{}); });
      hlsInstance.on(Hls.Events.ERROR, (evt, err)=>{
        if(!err||!err.fatal) return;
        console.warn('HLS fatal', err.type, err.details);
        if(err.type===Hls.ErrorTypes.NETWORK_ERROR){
          if(hlsRetries<3){ hlsRetries++; setTimeout(()=>{ if(hlsInstance){ hlsInstance.startLoad(); } }, 1000); return; }
          // último recurso: reproducir nativo o vía proxy
          destroyHls();
          if(nativeHlsSupported()){ audio.src=url; audio.load(); audio.play().catch(()=>{}); }
          else if(PROXY_BASE && !station._proxied){ station._proxied=true; startStream(station, true); }
          else { setConnecting(false); showStreamError('No se pudo conectar con la emisora (red).'); }
          return;
        }
        if(err.type===Hls.ErrorTypes.MEDIA_ERROR){ try{ hlsInstance.recoverMediaError(); }catch(_){ destroyHls(); setConnecting(false); showStreamError('Formato de audio no soportado en este navegador.'); } return; }
        destroyHls(); setConnecting(false); showStreamError('No se pudo reproducir esta emisora.');
      });
    }

    function startStream(s, forceProxy){
      userPaused=false; destroyHls(); hlsRetries=0;
      setConnecting(true);
      audio.crossOrigin=null;
      const url=buildStreamUrl(s, forceProxy);
      if(isHlsUrl(url)){
        if(nativeHlsSupported()){ audio.src=url; audio.load(); audio.play().catch(()=>{}); return; }
        if(window.Hls && Hls.isSupported()){ playViaHls(url, s); return; }
        audio.src=url; audio.load(); audio.play().catch(()=>{}); return;
      }
      audio.src=url; audio.load(); audio.play().catch(()=>{});
    }

    /* ---------- PLAYBACK ---------- */
    function play(i){
      index=i; const s=data.stations[index]; if(!s) return;
      delete s._proxied;
      stopStream(); startStream(s);
      const barImg=document.getElementById('pImg');
      barImg.onerror=function(){ this.onerror=null; this.src=PLACEHOLDER; };
      barImg.src=s.img||PLACEHOLDER;
      document.getElementById('pTitle').innerText=s.name;
      document.getElementById('pGenre').innerHTML=`<span class="live-badge"><span class="dot"></span>EN VIVO</span> ${escapeHtml([s.city, countryName(s.countryKey)].filter(Boolean).join(' · '))}`;
      loadGrid(document.getElementById('searchInput').value);
      if(document.getElementById('fullPlayer').classList.contains('open')) updateFullPlayer();
      syncPlayIcons(); syncFavButtons();
      if('mediaSession' in navigator){
        navigator.mediaSession.metadata=new MediaMetadata({ title:s.name, artist:data.site.footerText||'MultiRadios.es', artwork:[{src:s.img,sizes:'512x512',type:'image/png'}] });
        navigator.mediaSession.setActionHandler('play', ()=>{ if(userPaused||audio.paused) toggle(); });
        navigator.mediaSession.setActionHandler('pause', ()=>{ if(!audio.paused) toggle(); });
        navigator.mediaSession.setActionHandler('previoustrack', ()=>next(-1));
        navigator.mediaSession.setActionHandler('nexttrack', ()=>next(1));
      }
    }
    function toggle(){
      if(index===-1){ if(data.stations.length){ play(0); openFullPlayer(); } return; }
      const s=data.stations[index];
      if(userPaused||audio.paused||!audio.src){ startStream(s); }
      else { userPaused=true; stopStream(); }
      syncPlayIcons();
    }
    function next(dir){
      const list=view.list.length?view.list:data.stations.map((s,i)=>({s,i}));
      if(!list.length) return;
      let pos=list.findIndex(x=>x.i===index);
      pos=(pos+dir+list.length)%list.length;
      play(list[pos].i);
    }
    function syncPlayIcons(){
      const playIcon=document.getElementById('playIcon'), fpIcon=document.getElementById('fpPlayIcon');
      const fpArt=document.getElementById('fpArt'), barArt=document.getElementById('pImg');
      if(connecting){ playIcon.className='fas fa-spinner fa-spin'; fpIcon.className='fas fa-spinner fa-spin'; fpArt.classList.remove('beating'); barArt.classList.remove('beating'); loadGrid(document.getElementById('searchInput').value); return; }
      const playing=!audio.paused && !!audio.src && !userPaused;
      const cls=playing?'fa-pause':'fa-play';
      playIcon.className='fas '+cls;
      fpIcon.className='fas '+cls;
      fpArt.classList.toggle('beating', playing);
      barArt.classList.toggle('beating', playing);
      loadGrid(document.getElementById('searchInput').value);
    }
    function setConnecting(on){
      connecting=on;
      if(connectTimer){ clearTimeout(connectTimer); connectTimer=null; }
      if(on){ connectTimer=setTimeout(()=>{ if(connecting && audio.paused){ setConnecting(false); showStreamError('No se pudo conectar con la emisora. Intenta de nuevo.'); } }, 16000); }
      syncPlayIcons();

    function showStreamError(msg){

    audio.addEventListener('play', syncPlayIcons);

    /* ---------- COLOR DEL LOGO ---------- */
    function extractColor(imgUrl){
      return new Promise((resolve)=>{
        if(!imgUrl){ resolve(null); return; }
        const img=new Image(); img.crossOrigin='anonymous';
        img.onload=()=>{
          try{
            const c=document.createElement('canvas'); const w=c.width=48,h=c.height=48;
            const ctx=c.getContext('2d'); ctx.drawImage(img,0,0,w,h);
            const d=ctx.getImageData(0,0,w,h).data;
            let r=0,g=0,b=0,n=0,best=null,bestScore=-1;
            for(let i=0;i<d.length;i+=4){
              if(d[i+3]<125) continue;
              const R=d[i],G=d[i+1],B=d[i+2]; r+=R;g+=G;b+=B;n++;
              const mx=Math.max(R,G,B),mn=Math.min(R,G,B);
              const sat=mx===0?0:(mx-mn)/mx; const score=sat*(mx/255);
              if(score>bestScore){ bestScore=score; best={r:R,g:G,b:B}; }
            }
            if(!n) return resolve(null);
            const avg={r:Math.round(r/n),g:Math.round(g/n),b:Math.round(b/n)};
            resolve(bestScore>0.18?best:avg);
          }catch(e){ resolve(null); }
        };
        img.onerror=()=>resolve(null);
        img.src=imgUrl;
      });
    }
    function primaryColor(){ return getComputedStyle(document.documentElement).getPropertyValue('--primary').trim()||'#8B5CF6'; }
    async function applyFullPlayerColor(imgUrl){
      const bg=document.getElementById('fpBg');
      const col=await extractColor(imgUrl);
      if(col){
        const dk=v=>Math.round(v*0.72);
        const c1=`rgb(${dk(col.r)},${dk(col.g)},${dk(col.b)})`;
        bg.style.background=`radial-gradient(120% 90% at 50% 0%, ${c1} 0%, rgba(${col.r},${col.g},${col.b},0.30) 34%, #0B0A0F 82%)`;
      }else{
        const p=primaryColor();
        bg.style.background=`radial-gradient(120% 90% at 50% 0%, ${p} 0%, #0B0A0F 78%)`;
      }
    }

    /* ---------- NOTIFICATIONS ---------- */
    function showNotification(n){
      if(notifDismissed) return;
      if(!n||!n.active||!n.title) return;
      const id=String(n.id||n.title); let seen=[];
      try{ seen=JSON.parse(localStorage.getItem(NOTIF_SEEN_KEY)||'[]'); }catch(_){}
      if(seen.includes(id)) return;
      const toast=document.getElementById('notifToast');
      document.getElementById('notifTitle').innerText=n.title;
      document.getElementById('notifText').innerText=n.body||'';
      if(n.icon){ const ico=document.getElementById('notifIco'); const im=document.createElement('img'); im.className='n-ico'; im.src=n.icon; im.onerror=()=>{ im.replaceWith(makeBellIco()); }; ico.replaceWith(im); im.id='notifIco'; }
      const link=document.getElementById('notifLink');
      if(n.link){ link.href=n.link; link.style.display='inline-block'; } else link.style.display='none';
      toast.style.display='flex';
      let hideTimer=setTimeout(()=>toast.classList.add('show'),700);
      function dismiss(e){
        if(e){ e.preventDefault(); e.stopPropagation(); }
        notifDismissed=true;
        clearTimeout(hideTimer); clearTimeout(autoTimer);
        toast.classList.remove('show');
        try{ if(!seen.includes(id)){ seen.push(id); localStorage.setItem(NOTIF_SEEN_KEY, JSON.stringify(seen.slice(-50))); } }catch(_){}
        setTimeout(()=>{ toast.style.display='none'; }, 480);
      }
      const closeBtn=document.getElementById('notifClose');
      closeBtn.onclick=dismiss;
      const autoTimer=setTimeout(dismiss, 9000);
    }
    function makeBellIco(){ const d=document.createElement('div'); d.className='n-ico'; d.id='notifIco'; d.innerHTML='<i class="fas fa-bell"></i>'; return d; }

    async function doInstall(){ if(!deferredPrompt) return; deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; installBtn.classList.remove('show'); topInstall.style.display='none'; try{ if('Notification' in window && Notification.permission==='default') Notification.requestPermission(); }catch(_){} }

    /* ---------- INIT ---------- */
    async function init(){

        data=normalizeData(await loadData());

        renderCountries(); renderBanners(); loadGrid();
        setVol(0.8);
        openSharedStation();
        showNotification(data.notification);
      }catch(e){
        console.error('Error init', e);
        document.getElementById('radioGrid').innerHTML='<div class="empty-state"><i class="fas fa-triangle-exclamation"></i><p>Error al cargar la configuración.</p></div>';
      }
    }
    init();
  </script>
</body>
</html>
